<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* CSS Variables for theme management */
    :root {
      /* Daylight Mode variables (Platinum Bone & Obsidian Ink) */
      --bg-bone: #fafaf9;
      --bg-canvas: #fafaf9;
      --bg-surface: #ffffff;
      --bg-panel: #f4f3ee;
      --text-ink: #0c0c0b;
      --text-secondary: #262521;
      --text-muted: #4d4d4a;
      --border-color: #dcdcd6;
      --border-color-soft: #ebebe5;
      --accent-color: #2563eb;
      --accent-color-hover: #1d4ed8;
      --accent-rgb: 37, 99, 235;
      --badge-green: #e6f4ea;
      --text-green: #137333;
      --badge-amber: #fef3c7;
      --text-amber: #b45309;
      --badge-red: #fde8e8;
      --text-red: #c53030;
      
      --radius-default: 6px;
      --radius-sm: 4px;
      --radius-full: 999px;
      --shadow-sm: 0 1px 2px rgba(12,12,11,0.05);
      --shadow-md: 0 4px 12px rgba(12,12,11,0.06);
      --shadow-lg: 0 12px 28px rgba(12,12,11,0.12);
    }

    .night-theme {
      /* Lamplight Mode (Obsidian Ink & Charcoal) */
      --bg-bone: #0c0c0b;
      --bg-canvas: #0c0c0b;
      --bg-surface: #141416;
      --bg-panel: #1c1c1f;
      --text-ink: #fafaf9;
      --text-secondary: #cbd5e1;
      --text-muted: #8a8a84;
      --border-color: #1e293b;
      --border-color-soft: #1e293b;
      --accent-color: #4d88ff;
      --accent-color-hover: #7ea8ff;
      --accent-rgb: 77, 136, 255;
      --badge-green: rgba(16, 185, 129, 0.15);
      --text-green: #34d399;
      --badge-amber: rgba(245, 158, 11, 0.15);
      --text-amber: #fbbf24;
      --badge-red: rgba(239, 68, 68, 0.15);
      --text-red: #fca5a5;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg-bone); font-family: 'Inter', sans-serif; color: var(--text-ink); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transition: background-color 0.2s ease, color 0.2s ease; }
    body { overflow-x: hidden; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(12, 12, 11, 0.15); border-radius: 999px; }
    .night-theme ::-webkit-scrollbar-thumb { background: rgba(250, 250, 249, 0.15); }

    /* Custom CSS animations */
    @keyframes slide-in {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slide-in-right {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes bc-pulse {
      0% { transform: scale(0.85); opacity: 0.5; }
      50% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(0.85); opacity: 0.5; }
    }
    .bc-pulse-anim {
      animation: bc-pulse 1.8s infinite ease-in-out;
    }
    .toast-notification {
      animation: slide-in-right 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .modal-anim {
      animation: slide-in 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Georgia Font class override for editorial headers */
    .font-editorial {
      font-family: 'Georgia', 'Times New Roman', serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }
    .font-sans-tight {
      font-family: 'Inter Tight', sans-serif;
    }
  </style>
</head>

    // === GLOBAL TOAST NOTIFICATION PROVIDER ===

    }

    // === SVG ICON HELPERS ===
    const Icons = {
      Event: () => <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      Ask: () => <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
      Sparkles: () => <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>,
      Spotlight: () => <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15.4 12.8-2.6 2c-.3.2-.8.2-1.1 0l-2.6-2c-.4-.3-.3-.9.2-1.1L12 11l2.7.7c.5.2.6.8.2 1.1Z"/><path d="m12 2-1 4.5 1 2.5 1-2.5-1-4.5Z"/></svg>,
      OfficeHours: () => <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      Plus: () => <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Close: () => <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Check: () => <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      Email: () => <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
      MapPin: () => <svg viewBox="0 0 24 24" width="11" height="11" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
      Info: () => <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    };

    // === MAIN APP COMPONENT ===
    function App() {
      const [themeMode, setThemeMode] = useState('light');
      const [activeTab, setActiveTab] = useState('events');
      const [toasts, setToasts] = useState([]);
      
      // Global toast helper
      const addToast = (message, type = 'info') => {
        const id = Date.now().toString();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => removeToast(id), 3500);
      };
      
      const removeToast = (id) => {
        setToasts(prev => prev.filter(t => t.id !== id));
      };

      // Handle body class for theme toggling
      useEffect(() => {
        const body = document.body;
        if (themeMode === 'night') {
          body.classList.add('night-theme');
        } else {
          body.classList.remove('night-theme');
        }
      }, [themeMode]);

      return (
        <div style={{ display: 'flex', minHeight: '100vh', flexDirection: 'column' }}>
          {/* Top Header Navigation */}
          <header style={{
            background: 'var(--bg-surface)',
            borderBottom: '1px solid var(--border-color)',
            padding: '16px 24px',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            zIndex: 100
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
              <span className="font-editorial" style={{ fontSize: '20px', fontWeight: 'bold', letterSpacing: '-0.02em' }}>
                BridgeCircle
              </span>
              <span className="font-mono" style={{
                fontSize: '9px',
                background: 'var(--bg-panel)',
                padding: '4px 10px',
                borderRadius: 'var(--radius-sm)',
                border: '1px solid var(--border-color-soft)',
                color: 'var(--text-muted)'
              }}>
                PILOT INTERACTION SANDBOX

            </div>
            
            <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>

                <button 
                  onClick={() => setThemeMode('light')}
                  style={{
                    background: themeMode === 'light' ? 'var(--bg-surface)' : 'transparent',
                    border: 'none',
                    borderRadius: 'var(--radius-sm)',
                    padding: '6px 14px',
                    fontSize: '10px',
                    fontFamily: 'JetBrains Mono',
                    cursor: 'pointer',
                    fontWeight: themeMode === 'light' ? '600' : '400',
                    color: themeMode === 'light' ? 'var(--text-ink)' : 'var(--text-muted)',
                    transition: 'all 0.15s ease'
                  }}
                >
                  DAY
                </button>
                <button 
                  onClick={() => setThemeMode('night')}
                  style={{
                    background: themeMode === 'night' ? 'var(--bg-surface)' : 'transparent',
                    border: 'none',
                    borderRadius: 'var(--radius-sm)',
                    padding: '6px 14px',
                    fontSize: '10px',
                    fontFamily: 'JetBrains Mono',
                    cursor: 'pointer',
                    fontWeight: themeMode === 'night' ? '600' : '400',
                    color: themeMode === 'night' ? 'var(--text-ink)' : 'var(--text-muted)',
                    transition: 'all 0.15s ease'
                  }}
                >
                  LAMPLIGHT
                </button>
              </div>
            </div>
          </header>

          {/* Core Content Layout */}
          <div style={{ display: 'flex', flex: 1 }}>
            {/* Sidebar Navigation */}
            <nav style={{
              width: '240px',
              background: 'var(--bg-surface)',
              borderRight: '1px solid var(--border-color)',
              padding: '28px 16px',
              display: 'flex',
              flexDirection: 'column',
              gap: '6px',
              flexShrink: 0
            }}>
              <span className="font-mono text-muted" style={{ fontSize: '9px', fontWeight: 'bold', paddingLeft: '8px', marginBottom: '8px', letterSpacing: '0.1em' }}>
                UX MODULES
              </span>
              
              <button 
                onClick={() => setActiveTab('events')}
                style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: '10px',
                  width: '100%',
                  padding: '12px 14px',
                  background: activeTab === 'events' ? 'var(--bg-panel)' : 'transparent',
                  border: 'none',
                  borderRadius: 'var(--radius-default)',
                  textAlign: 'left',
                  cursor: 'pointer',
                  fontSize: '13px',
                  fontWeight: activeTab === 'events' ? '600' : '400',
                  color: activeTab === 'events' ? 'var(--text-ink)' : 'var(--text-muted)',
                  transition: 'background 0.15s ease'
                }}
              >
                <Icons.Event />
                <span>1. Event Suggestions</span>
              </button>

              <button 
                onClick={() => setActiveTab('queued-asks')}
                style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: '10px',
                  width: '100%',
                  padding: '12px 14px',
                  background: activeTab === 'queued-asks' ? 'var(--bg-panel)' : 'transparent',
                  border: 'none',
                  borderRadius: 'var(--radius-default)',
                  textAlign: 'left',
                  cursor: 'pointer',
                  fontSize: '13px',
                  fontWeight: activeTab === 'queued-asks' ? '600' : '400',
                  color: activeTab === 'queued-asks' ? 'var(--text-ink)' : 'var(--text-muted)',

              </button>

              <button 
                onClick={() => setActiveTab('spotlights')}
                style={{
                  display: 'flex',

                  width: '100%',

    // ==========================================
    // === MODULE 1: EVENT-BASED SUGGESTIONS ===

    function EventSuggestionsModule({ addToast, themeMode }) {
      const [attendees, setAttendees] = useState(CO_ATTENDEES_MOCK);
      const [sentIds, setSentIds] = useState([]);
      const [isWidgetDismissed, setIsWidgetDismissed] = useState(false);
      const [emailViewSize, setEmailViewSize] = useState('desktop'); // 'desktop' | 'mobile'

      const handleAddFriend = (id, name) => {
        setSentIds(prev => [...prev, id]);
        addToast(`Friend request sent to ${name}`, 'success');
      };

      const handleDismissRow = (id) => {
        setAttendees(prev => prev.filter(a => a.id !== id));
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '36px' }}>
          <div>
            <h1 className="font-editorial" style={{ fontSize: '28px', fontWeight: 'bold', margin: '0 0 8px 0', letterSpacing: '-0.015em' }}>
              Event-Based Friend Suggestions
            </h1>
            <p style={{ margin: 0, fontSize: '14px', color: 'var(--text-muted)', lineHeight: '1.5' }}>
              Suggests warm connections based on shared event attendance. Solves the login frequency issue with scheduled post-event emails and persistent dashboard recaps.
            </p>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: '40px', alignItems: 'start' }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '32px' }}>
              {/* Section A: Dashboard Widget */}
              <div style={{
                background: 'var(--bg-surface)',
                border: '1px solid var(--border-color)',
                borderRadius: 'var(--radius-default)',
                padding: '24px',
                boxShadow: 'var(--shadow-sm)'
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', borderBottom: '1px solid var(--border-color-soft)', paddingBottom: '14px', marginBottom: '20px' }}>
                  <div>
                    <span className="font-mono text-muted" style={{ fontSize: '9px', fontWeight: 'bold', letterSpacing: '0.1em' }}>
                      POST-EVENT RECAP
                    </span>
                    <h2 className="font-sans-tight" style={{ fontSize: '15px', fontWeight: 'bold', margin: '4px 0 0 0', letterSpacing: '-0.01em' }}>
                      PV Tech Gathering Connections
                    </h2>
                  </div>
                  <button 
                    onClick={() => { setIsWidgetDismissed(true); addToast("Dashboard widget dismissed"); }}
                    style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', padding: '4px', display: 'flex', alignItems: 'center' }}
                    title="Dismiss widget"
                  >
                    <Icons.Close />
                  </button>

      const handleAddAsk = (e) => {
        e.preventDefault();
        if (!questionText.trim()) return;
        const newAsk = {
          id: Date.now().toString(),
          category,
          question: questionText.trim(),
          isPrivate: true,
          expiresDays: 30,
          createdAt: new Date().toISOString().split('T')[0]
        };
        setAsks(prev => [newAsk, ...prev]);
        setQuestionText('');
        addToast("Question queued privately for AI matchmaking!", "success");
      };

      const handleRenewAsk = (id) => {
        setAsks(prev => prev.map(a => a.id === id ? { ...a, expiresDays: 30 } : a));
        addToast("Queued question active duration renewed to 30 days");
      };

      const handleArchiveAsk = (id) => {
        setAsks(prev => prev.filter(a => a.id !== id));
        addToast("Question archived and removed from matchmaking queue");
      };

      const handleConnectMatch = (matchId, name) => {
        setSentMatchIds(prev => [...prev, matchId]);
        addToast(`Queued question shared and connection requested with ${name}`, 'success');
      };

                  background: subTab === 'attendee' ? 'var(--bg-surface)' : 'transparent',
                  border: 'none',
                  borderRadius: 'var(--radius-sm)',
                  padding: '8px 16px',
                  fontSize: '11px',
                  fontFamily: 'JetBrains Mono',
                  cursor: 'pointer',
                  fontWeight: '600',
                  color: subTab === 'attendee' ? 'var(--text-ink)' : 'var(--text-muted)',
                  transition: 'all 0.15s ease'
                }}
              >
                BOOK OFFICE HOURS
              </button>
              <button 
                onClick={() => setSubTab('host')}
                style={{
                  background: subTab === 'host' ? 'var(--bg-surface)' : 'transparent',
                  border: 'none',
                  borderRadius: 'var(--radius-sm)',
                  padding: '8px 16px',
                  fontSize: '11px',
                  fontFamily: 'JetBrains Mono',
                  cursor: 'pointer',
                  fontWeight: '600',
                  color: subTab === 'host' ? 'var(--text-ink)' : 'var(--text-muted)',
                  transition: 'all 0.15s ease'
                }}
              >
                HOST SETTINGS
              </button>
            </div>
          </div>

          {/* Attendee Booking view */}
          {subTab === 'attendee' && (
            <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: '40px', alignItems: 'start' }}>
              {/* Slot browser */}
              <div style={{
                background: 'var(--bg-surface)',
                border: '1px solid var(--border-color)',
                borderRadius: 'var(--radius-default)',
                padding: '24px',
                boxShadow: 'var(--shadow-sm)'
              }}>
                <span className="font-mono text-muted" style={{ fontSize: '9px', fontWeight: 'bold', letterSpacing: '0.15em', display: 'block', marginBottom: '16px' }}>
                  AVAILABLE SLOTS
                </span>

                <div style={{ border: '1px solid var(--border-color)', borderRadius: 'var(--radius-default)', padding: '16px', background: 'var(--bg-panel)' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '16px' }}>
                    <div style={{ width: '36px', height: '36px', background: 'var(--bg-surface)', border: '1px solid var(--border-color)', borderRadius: '4px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: '600', fontSize: '13px', fontFamily: 'JetBrains Mono' }}>
                      PS
                    </div>
                    <div>
                      <span style={{ fontSize: '13.5px', fontWeight: 'bold', display: 'block' }}>Priya Shah &apos;15</span>
                      <span style={{ fontSize: '11.5px', color: 'var(--text-muted)' }}>Friday Coffee Chats (May 22)</span>
                    </div>
                  </div>

                  <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                    {slots.map(s => {
                      if (s.isBooked) return null;
                      return (
                        <button
                          key={s.id}
                          onClick={() => setBookingSlotId(s.id)}
                          style={{
                            width: '100%',
                            background: bookingSlotId === s.id ? 'var(--text-ink)' : 'var(--bg-surface)',
                            color: bookingSlotId === s.id ? 'var(--bg-bone)' : 'var(--text-ink)',
                            border: '1px solid var(--border-color)',
                            borderRadius: 'var(--radius-sm)',
                            padding: '10px 14px',
                            fontSize: '11.5px',
                            fontFamily: 'JetBrains Mono',
                            cursor: 'pointer',
                            textAlign: 'left',
                            display: 'flex',
                            justifyContent: 'space-between',
                            fontWeight: '600',
                            transition: 'all 0.15s ease'
                          }}
                        >
                          <span>{s.time}</span>
                          <span>[ BOOK SLOT ]</span>
                        </button>
                      );
                    })}
                    {slots.filter(s => !s.isBooked).length === 0 && (
                      <div style={{ fontSize: '12px', color: 'var(--text-muted)', textAlign: 'center', padding: '12px 0' }}>
                        No open slots remaining for Friday.
                      </div>
                    )}
                  </div>

                  {bookingSlotId && (
                    <form onSubmit={handleBookSlot} style={{ borderTop: '1px dashed var(--border-color)', marginTop: '16px', paddingTop: '16px', display: 'flex', flexDirection: 'column', gap: '12px' }}>
                      <label className="font-mono text-muted" style={{ fontSize: '9px', fontWeight: 'bold' }}>DISCUSSION TOPIC / QUESTIONS</label>
                      <input
                        type="text"
                        value={bookingNotes}
                        onChange={(e) => setBookingNotes(e.target.value)}
                        placeholder="e.g. Ask about transitioning to PM at Google, mock resume review."
                        required
                        style={{
                          width: '100%',
                          padding: '10px',
                          background: 'var(--bg-surface)',
                          border: '1px solid var(--border-color)',
                          borderRadius: 'var(--radius-sm)',
                          fontSize: '12px',
                          outline: 'none',
                          color: 'var(--text-ink)'
                        }}
                      />
                      <div style={{ display: 'flex', gap: '8px', alignSelf: 'flex-end' }}>
                        <button
                          type="button"
                          onClick={() => setBookingSlotId(null)}
                          style={{
                            background: 'none',
                            border: '1px solid var(--border-color)',
                            borderRadius: 'var(--radius-sm)',
                            padding: '6px 14px',
                            fontSize: '10.5px',
                            fontFamily: 'JetBrains Mono',
                            cursor: 'pointer',
                            color: 'var(--text-ink)',
                            fontWeight: '600'
                          }}
                        >
                          CANCEL
                        </button>
                        <button
                          type="submit"
                          style={{
                            background: 'var(--accent-color)',
                            color: '#ffffff',
                            border: 'none',
                            borderRadius: 'var(--radius-sm)',
                            padding: '6px 14px',
                            fontSize: '10.5px',
                            fontFamily: 'JetBrains Mono',
                            fontWeight: '600',
                            cursor: 'pointer'
                          }}
                        >
                          CONFIRM
                        </button>
                      </div>
                    </form>
                  )}
                </div>
              </div>

              {/* Email Confirmation simulator window */}
              <div>
                <span className="font-mono text-muted" style={{ fontSize: '9px', fontWeight: 'bold', display: 'block', marginBottom: '12px' }}>
                  BOOKING CONFIRMATION EMAIL
                </span>

                {showEmailConfirm ? (
                  <div style={{
                    background: '#ffffff',
                    border: '1px solid #dcdcd6',
                    borderRadius: 'var(--radius-default)',
                    boxShadow: 'var(--shadow-md)',
                    color: '#0c0c0b',
                    overflow: 'hidden'
                  }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#f4f3ee', padding: '12px 16px', borderBottom: '1px solid #dcdcd6', fontSize: '11px', fontFamily: 'JetBrains Mono', color: '#4d4d4a', lineHeight: '1.5' }}>
                      <div><span style={{ fontWeight: 'bold', color: '#0c0c0b' }}>Subject:</span> Confirmed: Office Hours Session Booked</div>
                      <button onClick={() => setShowEmailConfirm(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#0c0c0b', fontSize: '11px', display: 'flex' }}>[×]</button>
                    </div>

                    <div style={{ padding: '24px 20px', background: '#fafaf9' }}>
                      <span className="font-editorial" style={{ fontSize: '18px', fontWeight: 'bold', display: 'block', marginBottom: '12px' }}>
                        Confirmed Session Invitation
                      </span>

                      <div style={{ border: '1px solid #dcdcd6', background: '#ffffff', padding: '14px', borderRadius: '4px', display: 'grid', gridTemplateColumns: '80px 1fr', gap: '16px', fontSize: '12px' }}>
                        <div style={{ textAlign: 'center', background: '#f4f3ee', padding: '12px 6px', borderRadius: '4px', border: '1px solid #dcdcd6' }}>
                          <span className="font-mono" style={{ fontSize: '9px', color: '#4d4d4a', display: 'block', textTransform: 'uppercase' }}>FRI</span>
                          <span style={{ fontSize: '24px', fontWeight: 'bold', display: 'block', color: '#0c0c0b', lineHeight: 1, margin: '2px 0' }}>22</span>
                          <span className="font-mono" style={{ fontSize: '9px', color: '#4d4d4a', display: 'block', textTransform: 'uppercase' }}>MAY</span>
                        </div>
                        <div>
                          <span style={{ fontSize: '13px', fontWeight: 'bold', display: 'block', marginBottom: '4px' }}>
                            Coffee Chat: Priya Shah & Richard Lee
                          </span>
                          <span style={{ color: '#4d4d4a', display: 'block', marginBottom: '2px' }}>
                            Time: 3:00 PM - 3:20 PM PDT
                          </span>
                          <span style={{ color: '#4d4d4a', display: 'block' }}>
                            Link: <a href="#" style={{ color: '#2563eb', textDecoration: 'underline' }}>meet.google.com/abc-defg-hij</a>
                          </span>
                        </div>
                      </div>

                      <p style={{ margin: '14px 0 0 0', fontSize: '11px', color: '#4d4d4a', lineHeight: '1.4' }}>
                        A calendar invite (.ics) has been dispatched to your registered alumni inbox.
                      </p>
                    </div>
                  </div>
                ) : (
                  <div style={{ border: '1px dashed var(--border-color)', borderRadius: 'var(--radius-default)', padding: '36px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '13px' }}>
                    Select an open slot to claim and preview booking verification details.
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Host Settings view */}
          {subTab === 'host' && (
            <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: '40px', alignItems: 'start' }}>
              {/* Host Workspace (Slot scheduling) */}
              <div style={{
                background: 'var(--bg-surface)',
                border: '1px solid var(--border-color)',
                borderRadius: 'var(--radius-default)',
                padding: '24px',
                boxShadow: 'var(--shadow-sm)'
              }}>
                <span className="font-mono text-muted" style={{ fontSize: '9px', fontWeight: 'bold', letterSpacing: '0.15em', display: 'block', marginBottom: '16px' }}>
                  HOST AVAILABILITY SETUP
                </span>

                <div style={{ display: 'flex', gap: '12px', alignItems: 'flex-end', marginBottom: '24px' }}>
                  <div style={{ flex: 1 }}>
                    <label className="font-mono text-muted" style={{ fontSize: '9px', display: 'block', marginBottom: '6px', fontWeight: 'bold' }}>START TIME</label>
                    <select
                      value={newSlotTime}
                      onChange={(e) => setNewSlotTime(e.target.value)}
                      style={{
                        width: '100%',
                        padding: '10px 12px',
                        background: 'var(--bg-panel)',
                        border: '1px solid var(--border-color)',
                        borderRadius: 'var(--radius-sm)',
                        fontSize: '13px',
                        color: 'var(--text-ink)'
                      }}
                    >
                      <option>3:00 PM</option>
                      <option>3:20 PM</option>
                      <option>3:40 PM</option>
                      <option>4:00 PM</option>
                    </select>
                  </div>
                  
                  <button
                    onClick={handleAddSlot}
                    style={{
                      background: 'var(--text-ink)',
                      color: 'var(--bg-bone)',
                      border: 'none',
                      borderRadius: 'var(--radius-sm)',
                      padding: '11px 18px',
                      fontSize: '11px',
                      fontFamily: 'JetBrains Mono',
                      fontWeight: '600',
                      cursor: 'pointer',
                      display: 'flex',
                      alignItems: 'center',
                      gap: '4px',
                      transition: 'opacity 0.15s ease'
                    }}
                  >
                    <Icons.Plus />
                    ADD SLOT
                  </button>
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                  <span className="font-mono text-muted" style={{ fontSize: '8.5px', fontWeight: 'bold', display: 'block' }}>
                    YOUR ACTIVE SLOTS (FRIDAY, MAY 22)
                  </span>

                  {slots.map(s => (
                    <div key={s.id} style={{
                      display: 'flex',
                      justifyContent: 'space-between',
                      alignItems: 'center',
                      padding: '12px 14px',
                      border: '1px solid var(--border-color-soft)',
                      borderRadius: 'var(--radius-default)',
                      background: s.isBooked ? 'var(--badge-amber)' : 'var(--bg-canvas)'
                    }}>
                      <div>
                        <span className="font-mono" style={{ fontSize: '12px', fontWeight: 'bold', marginRight: '8px', color: 'var(--text-ink)' }}>{s.time}</span>
                        {s.isBooked ? (
                          <span style={{ fontSize: '11.5px', color: 'var(--text-amber)', fontWeight: '600' }}>
                            Claimed by {s.bookerName}
                          </span>
                        ) : (
                          <span style={{ fontSize: '11.5px', color: 'var(--text-muted)' }}>[ Open slot ]</span>
                        )}
                        {s.notes && (
                          <div style={{ fontSize: '11px', fontStyle: 'italic', marginTop: '6px', color: 'var(--text-muted)', borderLeft: '2px solid var(--border-color)', paddingLeft: '8px' }}>
                            Topic: &ldquo;{s.notes}&rdquo;
                          </div>
                        )}
                      </div>

                      {s.isBooked && (
                        <button
                          onClick={() => handleCancelBooking(s.id)}
                          style={{
                            background: 'none',
                            border: 'none',
                            color: 'var(--text-red)',
                            fontSize: '10.5px',
                            fontFamily: 'JetBrains Mono',
                            cursor: 'pointer',
                            fontWeight: '600'
                          }}
                        >
                          [ CANCEL ]
                        </button>
                      )}
                    </div>
                  ))}
                </div>
              </div>

              {/* Host Quick Guide */}
              <div style={{
                background: 'var(--bg-surface)',
                border: '1px dashed var(--border-color)',
                borderRadius: 'var(--radius-default)',
                padding: '24px',
                color: 'var(--text-muted)'
              }}>
                <h3 className="font-sans-tight" style={{ fontSize: '14px', fontWeight: 'bold', margin: '0 0 8px 0', color: 'var(--text-ink)' }}>
                  Host Best Practices
                </h3>
                <ul style={{ margin: 0, paddingLeft: '20px', fontSize: '12.5px', lineHeight: '1.6' }}>
                  <li>Offer 20-minute chunks to keep discussions focused and lightweight.</li>
                  <li>Link your Google Meet or Zoom coordinates to automate dispatching calendar invites.</li>
                  <li>Cancel slots at least 24 hours in advance to keep warm-network connections friendly.</li>
                </ul>
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
