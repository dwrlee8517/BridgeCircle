  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Google Fonts for Editorial Aesthetic -->

  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {

    .slider::-webkit-slider-thumb {

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const CURATED_BLUES = [
      { name: 'Civic Blue', hex: '#4d88ff', desc: 'Vibrant, high-legibility daylight cobalt' },
      { name: 'Editorial Cobalt', hex: '#173fb3', desc: 'Baseline high-contrast professional blue' },
      { name: 'Daylight Indigo', hex: '#3b82f6', desc: 'Balanced bright slate blue, extremely clean' },
      { name: 'Electric Sky', hex: '#2563eb', desc: 'Vibrant, high-energy modern community blue' },
      { name: 'Steel Blue', hex: '#4f46e5', desc: 'Dignified indigo-tinted blue for corporate trust' },
      { name: 'Slate Teal', hex: '#0284c7', desc: 'Brighter teal-toned sky blue, excellent contrast' },
      { name: 'Oxford Navy', hex: '#1e3a8a', desc: 'Traditional, print-journal authority dark blue' }
    ];

    const MOCK_DATA = {
      user: { firstName: 'Richard', cohort: "'07", orgName: 'Chadwick Alumni Council' },
      stats: { newJoiners: 8, openMentors: 34, upcomingEvents: 3 },
      pendingRequests: [
        { id: 1, name: 'Sujin Park', class: "'12 · Product Design", text: 'Seeking advice on shifting from agency to corporate product design teams.' }
      ],
      gatherings: [
        { id: 1, title: 'Supper Club Seoul: Fintech & Venture', host: 'Richard Lee', date: 'May 28', time: '7:30 PM', spotsFilled: 12, totalSpots: 15, daysLeft: 8 }
      ],
      joiners: [
        { name: 'Iris Okonkwo', year: "'14", role: 'Data Scientist', org: 'Toss Seoul' }
      ]
    };

    function Icon({ name, size = 16, color = 'currentColor', strokeWidth = 2, style }) {
      const icons = {
        people: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />,
        calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><path d="M16 2v4M8 2v4M3 10h18" /></>,
        inbox: <><polyline points="22 12 16 12 14 15 10 15 8 12 2 12" /><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" /></>,
        bell: <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" />,
        search: <><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></>,
        sun: <><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" /></>,
        moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />,
        copy: <><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></>
      };
      const path = icons[name] || <circle cx="12" cy="12" r="10" />;
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={{ width: `${size}px`, height: `${size}px`, flexShrink: 0, ...style }}>
          {path}
        </svg>
      );
    }

    // Helper to convert hex to HSL
    function hexToHSL(hex) {
      let r = parseInt(hex.slice(1, 3), 16) / 255;
      let g = parseInt(hex.slice(3, 5), 16) / 255;
      let b = parseInt(hex.slice(5, 7), 16) / 255;
      let max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) {
        h = s = 0;
      } else {
        let d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      return {
        h: Math.round(h * 360),
        s: Math.round(s * 100),
        l: Math.round(l * 100)
      };
    }

    // Helper to convert HSL to hex
    function hslToHex(h, s, l) {
      l /= 100;
      const a = s * Math.min(l, 1 - l) / 100;
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function ColorPreviewApp() {
      const [themeMode, setThemeMode] = useState('light');
      const [hue, setHue] = useState(220); // Blue range default
      const [saturation, setSaturation] = useState(100);
      const [lightness, setLightness] = useState(65);
      const [customHex, setCustomHex] = useState('#4d88ff');
      const [activeTab, setActiveTab] = useState('People');
      const [copied, setCopied] = useState(false);

      // Initialize with HSL values when hex changes
      const selectHex = (hex) => {
        const hsl = hexToHSL(hex);
        setHue(hsl.h);
        setSaturation(hsl.s);
        setLightness(hsl.l);
        setCustomHex(hex);
      };

      // Recalculate hex when sliders change
      useEffect(() => {
        const hex = hslToHex(hue, saturation, lightness);
        setCustomHex(hex);
        document.documentElement.style.setProperty('--accent-color', hex);
      }, [hue, saturation, lightness]);

      const triggerCopy = () => {
        navigator.clipboard.writeText(customHex.toUpperCase());
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const isLight = themeMode === 'light';
      const bgColor = isLight ? '#fafaf9' : '#0c0c0b';
      const cardColor = isLight ? '#ffffff' : '#141416';
      const textColor = isLight ? '#0c0c0b' : '#fafaf9';
      const ruleColor = isLight ? '#dcdcd6' : '#2d2d30';
      const subInk = isLight ? '#262521' : '#ebebe5';
      const mutedText = '#71717a';

      return (
        <div style={{
          minHeight: '100vh',
          background: bgColor,
          color: textColor,
          fontFamily: 'Inter, sans-serif',
          display: 'grid',
          gridTemplateColumns: '360px 1fr',
          transition: 'background 0.2s, color 0.2s'
        }}>
          {/* SIDE PANEL: COLOR ADJUSTER CONTROLS */}
          <aside style={{
            background: isLight ? '#ffffff' : '#101012',
            borderRight: `1px solid ${ruleColor}`,
            padding: '32px 24px',
            display: 'flex',
            flexDirection: 'column',
            justifyContent: 'space-between',
            height: '100vh',
            position: 'sticky',
            top: 0
          }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '28px' }}>
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' }}>
                  <svg width="20" height="20" viewBox="0 0 200 200">
                    <circle cx="85" cy="100" r="48" fill={customHex} fillOpacity="0.88" />
                    <circle cx="115" cy="100" r="48" fill={textColor} fillOpacity="0.88" />
                  </svg>
                  <span style={{ fontFamily: 'Inter Tight', fontSize: '15px', fontWeight: 700, letterSpacing: '-0.02em' }}>
                    Accent Swatch Labs
                  </span>
                </div>
                <p style={{ fontSize: '11px', color: mutedText, lineHeight: 1.45 }}>
                  Tune the perfect brand blue. Test pre-curated palette lines or generate bespoke hues using the HSL grid below.
                </p>
              </div>

              {/* CURATED BLUE LIST */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                <h4 style={{ fontFamily: 'JetBrains Mono', fontSize: '9px', fontWeight: 700, color: mutedText, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Curated Brand Blues</h4>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                  {CURATED_BLUES.map(blue => {
                    const isSelected = customHex.toLowerCase() === blue.hex.toLowerCase();
                    return (
                      <button
                        key={blue.hex}
                        onClick={() => selectHex(blue.hex)}
                        style={{
                          background: isSelected ? (isLight ? '#fafaf9' : '#1c1c1f') : 'transparent',
                          border: `1px solid ${isSelected ? ruleColor : 'transparent'}`,
                          borderRadius: '6px',
                          padding: '10px 12px',
                          display: 'flex',
                          alignItems: 'center',
                          gap: '12px',
                          cursor: 'pointer',
                          width: '100%',
                          textAlign: 'left'
                        }}
                      >
                        <div style={{ width: '16px', height: '16px', borderRadius: '4px', background: blue.hex, flexShrink: 0 }} />
                        <div style={{ minWidth: 0 }}>
                          <div style={{ fontSize: '12px', fontWeight: 600, color: textColor }}>{blue.name}</div>
                          <div style={{ fontSize: '9px', color: mutedText, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{blue.hex} · {blue.desc}</div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* HSL SLIDERS */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: '14px', borderTop: `1px solid ${ruleColor}`, paddingTop: '20px' }}>
                <h4 style={{ fontFamily: 'JetBrains Mono', fontSize: '9px', fontWeight: 700, color: mutedText, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Precision HSL Tuning</h4>
                
                {/* Hue Slider (blue range 190 - 250) */}
                <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '11px' }}>
                    <span style={{ fontWeight: 500 }}>Hue (Blue range)</span>
                    <span style={{ fontFamily: 'JetBrains Mono', fontWeight: 'bold', color: customHex }}>{hue}°</span>
                  </div>
                  <input 
                    type="range" 
                    min="180" 
                    max="260" 
                    value={hue} 
                    onChange={e => setHue(parseInt(e.target.value))} 
                    className="slider"
                    style={{ '--accent-color': customHex }}
                  />
                </div>

                {/* Saturation Slider */}
                <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '11px' }}>
                    <span style={{ fontWeight: 500 }}>Saturation</span>
                    <span style={{ fontFamily: 'JetBrains Mono', fontWeight: 'bold', color: customHex }}>{saturation}%</span>
                  </div>
                  <input 
                    type="range" 
                    min="40" 
                    max="100" 
                    value={saturation} 
                    onChange={e => setSaturation(parseInt(e.target.value))} 
                    className="slider"
                    style={{ '--accent-color': customHex }}
                  />
                </div>

                {/* Lightness Slider */}
                <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '11px' }}>
                    <span style={{ fontWeight: 500 }}>Lightness</span>
                    <span style={{ fontFamily: 'JetBrains Mono', fontWeight: 'bold', color: customHex }}>{lightness}%</span>
                  </div>
                  <input 
                    type="range" 
                    min="35" 
                    max="70" 
                    value={lightness} 
                    onChange={e => setLightness(parseInt(e.target.value))} 
                    className="slider"
                    style={{ '--accent-color': customHex }}
                  />
                </div>
              </div>
            </div>

            {/* COLOR VALUES AND HEX COPYS */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
              <div style={{
                background: isLight ? '#fafaf9' : '#141416',
                border: `1px solid ${ruleColor}`,
                borderRadius: '6px',
                padding: '14px',
                display: 'flex',
                alignItems: 'center',

                  <span style={{ fontFamily: 'JetBrains Mono', fontSize: '14px', fontWeight: 'bold', color: textColor }}>{customHex.toUpperCase()}</span>
                </div>
                <button

                  style={{
                    background: copied ? '#10b981' : customHex,

                </button>
              </div>

              {/* Theme Toggle Button */}

                onClick={() => setThemeMode(isLight ? 'lamplight' : 'light')}
                style={{
                  background: 'transparent',
                  border: `1px solid ${ruleColor}`,
                  borderRadius: '6px',
                  padding: '10px 14px',
                  fontSize: '12px',
                  fontWeight: 600,
                  color: textColor,
                  cursor: 'pointer',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  gap: '8px'

                <span>Toggle {isLight ? 'Lamplight' : 'Daylight'} Mode</span>
              </button>
            </div>
          </aside>

          {/* MAIN PREVIEW CANVAS: REAL-TIME RENDERING */}
          <main style={{ padding: '40px' }}>
            <div style={{ maxWidth: '1100px', margin: '0 auto', display: 'flex', flexDirection: 'column', gap: '32px' }}>
              <div>
                <h2 style={{ fontFamily: 'Inter Tight', fontSize: '24px', fontWeight: 600, color: textColor }}>Atrium Canvas Renderer</h2>
                <p style={{ fontSize: '13px', color: mutedText, marginTop: '4px' }}>
                  Below is the dashboard wrapped in Option A (Editorial Header) styled using the dynamic color <span style={{ color: customHex, fontWeight: 600 }}>{customHex}</span>.
                </p>
              </div>

              {/* INTEGRATED MOCK DESKTOP FRAME */}
              <div style={{
                background: isLight ? '#ffffff' : '#141416',
                border: `2px solid ${customHex}`,
                borderRadius: '8px',
                boxShadow: isLight ? '0 12px 32px rgba(12,12,11,0.04)' : 'none',
                overflow: 'hidden',
                display: 'flex',
                flexDirection: 'column',
                transition: 'border-color 0.2s'
              }}>
                {/* Header (Option A) */}
                <header style={{
                  height: '64px',
                  background: isLight ? '#ffffff' : '#141416',
                  borderBottom: `1px solid ${ruleColor}`,
                  padding: '0 24px',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'space-between'
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <svg width="20" height="20" viewBox="0 0 200 200">
                      <circle cx="85" cy="100" r="48" fill={customHex} fillOpacity="0.88" />
                      <circle cx="115" cy="100" r="48" fill={textColor} fillOpacity="0.88" />
                    </svg>
                    <span style={{ fontFamily: 'Inter Tight', fontSize: '15px', fontWeight: 700, color: textColor }}>
                      Bridge<span style={{ color: customHex }}>Circle</span>
                    </span>
                  </div>

                  <nav style={{ display: 'flex', gap: '24px', height: '100%' }}>
                    {['People', 'Inbox', 'Events'].map(tab => {
                      const isActive = activeTab === tab;
                      return (
                        <button
                          key={tab}
                          onClick={() => setActiveTab(tab)}
                          style={{
                            background: 'none',
                            border: 'none',
                            color: isActive ? textColor : mutedText,
                            fontWeight: isActive ? 600 : 500,
                            fontSize: '12px',
                            cursor: 'pointer',
                            position: 'relative',
                            height: '100%',
                            display: 'flex',
                            alignItems: 'center'
                          }}
                        >
                          {tab}
                          {isActive && (
                            <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: '2px', background: customHex }} />
                          )}
                        </button>
                      );
                    })}
                  </nav>

                  <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '6px', background: isLight ? '#fafaf9' : '#1c1c1f', border: `1px solid ${ruleColor}`, borderRadius: '999px', padding: '4px 10px', width: '120px' }}>
                      <Icon name="search" size={11} color={mutedText} />
                      <span style={{ color: mutedText, fontSize: '10px' }}>Search...</span>
                    </div>
                    <div style={{ position: 'relative', color: textColor }}>
                      <Icon name="bell" size={14} />
                      <span style={{ position: 'absolute', top: '-4px', right: '-4px', background: customHex, color: '#fff', fontFamily: 'JetBrains Mono', fontSize: '7px', fontWeight: 700, width: '10px', height: '10px', borderRadius: '50%', display: 'grid', placeItems: 'center' }}>2</span>
                    </div>
                    <div style={{ width: '24px', height: '24px', borderRadius: '4px', background: `linear-gradient(135deg, ${customHex}, ${textColor})`, display: 'grid', placeItems: 'center', fontFamily: 'JetBrains Mono', fontSize: '9px', fontWeight: 700, color: '#fff' }}>
                      RL
                    </div>
                  </div>
                </header>

                {/* Dashboard Frame Area */}
                <div style={{ padding: '24px', display: 'flex', flexDirection: 'column', gap: '20px', background: isLight ? '#fafaf9' : '#0c0c0b' }}>
                  {/* Greeting Block */}
                  <div style={{
                    background: isLight ? '#ffffff' : '#141416',
                    border: `1px solid ${ruleColor}`,
                    borderRadius: '6px',
                    padding: '20px',
                    position: 'relative',
                    overflow: 'hidden'
                  }}>
                    <svg width="180" height="110" viewBox="0 0 240 150" fill="none" style={{ position: 'absolute', right: '-10px', top: '-10px', opacity: isLight ? 0.15 : 0.08, pointerEvents: 'none' }}>
                      <circle cx="100" cy="75" r="55" stroke={customHex} strokeWidth="1.2" />
                      <circle cx="150" cy="75" r="55" stroke={customHex} strokeWidth="1.2" />
                    </svg>

                    <div style={{ position: 'relative', zIndex: 1 }}>
                      <div style={{ fontFamily: 'JetBrains Mono', fontSize: '9px', fontWeight: 600, color: mutedText, letterSpacing: '0.12em', textTransform: 'uppercase' }}>
                        Class of &apos;07 · Member Atrium
                      </div>
                      <h3 style={{ fontFamily: 'Inter Tight', fontSize: '20px', fontWeight: 600, margin: '6px 0 4px', color: textColor }}>
                        Welcome back, Richard.
                      </h3>
                      <p style={{ margin: 0, fontSize: '11px', color: mutedText, maxWidth: '500px', lineHeight: 1.5 }}>
                        Your verified alumni circle has <strong style={{ color: textColor }}>{MOCK_DATA.stats.newJoiners} updates</strong> waiting.
                      </p>
                    </div>
                  </div>

                  {/* Desk request block */}
                  <div style={{
                    border: `1px solid ${ruleColor}`,
                    borderRadius: '6px',
                    overflow: 'hidden'
                  }}>
                    <div style={{ background: '#0c0c0b', padding: '12px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                      <div>
                        <div style={{ fontFamily: 'JetBrains Mono', fontSize: '8px', fontWeight: 700, color: '#8a8a84', textTransform: 'uppercase', letterSpacing: '0.08em' }}>Desk Requests</div>
                        <div style={{ display: 'flex', alignItems: 'baseline', gap: '6px', marginTop: '2px' }}>
                          <span style={{ fontFamily: 'Inter Tight', fontSize: '24px', fontWeight: 'bold', color: customHex, lineHeight: 1 }}>{MOCK_DATA.pendingRequests.length}</span>
                          <span style={{ fontSize: '11px', color: '#fafaf9' }}>advice request needs review</span>
                        </div>
                      </div>
                      <button style={{ background: customHex, color: '#fff', border: 'none', borderRadius: '4px', padding: '6px 12px', fontSize: '10px', fontWeight: 600, cursor: 'pointer' }}>Open Desk</button>
                    </div>
                  </div>

                  {/* Three Column Action Grid */}
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '16px' }}>
                    {/* Col 1 */}
                    <div>
                      <div style={{ borderTop: `2px solid ${textColor}`, paddingTop: '8px', marginBottom: '10px' }}>
                        <span style={{ fontSize: '12px', fontWeight: 600, color: textColor }}>Advice Desk</span>
                      </div>
                      <div style={{
                        background: isLight ? '#ffffff' : '#141416',
                        border: `1px solid ${ruleColor}`,
                        borderRadius: '6px',
                        padding: '12px',
                        display: 'flex',
                        flexDirection: 'column',
                        gap: '8px'
                      }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                          <div style={{ width: '24px', height: '24px', borderRadius: '4px', background: `${customHex}14`, border: `1px solid ${customHex}33`, color: customHex, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'JetBrains Mono', fontSize: '9px', fontWeight: 'bold' }}>SP</div>
                          <div>
                            <div style={{ fontSize: '11px', fontWeight: 600, color: textColor }}>Sujin Park</div>
                            <span style={{ fontSize: '8px', color: mutedText }}>Class of &apos;12</span>
                          </div>
                        </div>
                        <p style={{ margin: 0, fontSize: '10px', color: subInk, lineHeight: 1.35, fontStyle: 'italic', borderLeft: `2px solid ${customHex}44`, paddingLeft: '6px' }}>
                          &ldquo;Seeking advice on shifting to corporate teams.&rdquo;
                        </p>
                      </div>
                    </div>

                    {/* Col 2 */}
                    <div>
                      <div style={{ borderTop: `2px solid ${textColor}`, paddingTop: '8px', marginBottom: '10px' }}>
                        <span style={{ fontSize: '12px', fontWeight: 600, color: textColor }}>Seoul Gatherings</span>
                      </div>
                      <div style={{
                        background: isLight ? '#ffffff' : '#141416',
                        border: `1px solid ${ruleColor}`,
                        borderRadius: '6px',
                        padding: '12px',
                        display: 'flex',
                        flexDirection: 'column',
                        gap: '8px'
                      }}>
                        <div>
                          <div style={{ fontSize: '11px', fontWeight: 600, color: textColor }}>{MOCK_DATA.gatherings[0].title}</div>
                          <span style={{ fontSize: '8px', color: mutedText }}>{MOCK_DATA.gatherings[0].date} · {MOCK_DATA.gatherings[0].time}</span>
                        </div>
                        <div>
                          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '8px', color: mutedText, marginBottom: '2px' }}>
                            <span>Capacity</span>
                            <span style={{ fontWeight: 600, color: customHex }}>{MOCK_DATA.gatherings[0].spotsFilled}/{MOCK_DATA.gatherings[0].totalSpots} filled</span>
                          </div>
                          <div style={{ background: isLight ? '#fafaf9' : '#1c1c1f', height: '4px', borderRadius: '999px', overflow: 'hidden' }}>
                            <div style={{ background: customHex, height: '100%', width: '80%' }} />
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Col 3 */}
                    <div>
                      <div style={{ borderTop: `2px solid ${textColor}`, paddingTop: '8px', marginBottom: '10px' }}>
                        <span style={{ fontSize: '12px', fontWeight: 600, color: textColor }}>New Connections</span>
                      </div>
                      <div style={{
                        background: isLight ? '#ffffff' : '#141416',
                        border: `1px solid ${ruleColor}`,
                        borderRadius: '6px',
                        padding: '12px',
                        display: 'flex',
                        flexDirection: 'column',
                        gap: '8px'
                      }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                          <div style={{ width: '24px', height: '24px', borderRadius: '4px', background: isLight ? '#fafaf9' : '#1c1c1f', border: `1px solid ${ruleColor}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'JetBrains Mono', fontSize: '9px', fontWeight: 'bold', color: customHex }}>IO</div>
                          <div>
                            <div style={{ fontSize: '11px', fontWeight: 600, color: textColor }}>{MOCK_DATA.joiners[0].name}</div>
                            <span style={{ fontSize: '9px', color: mutedText }}>Class of {MOCK_DATA.joiners[0].year}</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ColorPreviewApp />);
  </script>
</body>
</html>
