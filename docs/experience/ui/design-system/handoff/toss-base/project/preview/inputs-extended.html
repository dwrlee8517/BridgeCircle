<!-- @dsCard group="Components" name="Extended inputs" subtitle="Slider · stepper · numeric spinner · rating" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-page);font-family:var(--font-sans);color:var(--text-primary);display:grid;gap:14px}
  .card{background:var(--surface-card);border-radius:var(--radius-large);box-shadow:var(--shadow-card);padding:18px 20px}
  .label{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin:0 0 14px}
  /* slider */
  .slider{position:relative;height:28px;display:flex;align-items:center;max-width:320px}
  .slider .track{width:100%;height:6px;border-radius:var(--radius-pill);background:var(--grey-100)}
  .slider .fill{position:absolute;left:0;height:6px;border-radius:var(--radius-pill);background:var(--action-primary)}
  .slider .thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgb(2 9 19 / .25), inset 0 0 0 1px var(--border)}
  .slider .vals{position:absolute;top:100%;left:0;right:0;display:flex;justify-content:space-between;font-size:12px;color:var(--text-faint);font-variant-numeric:tabular-nums}
  /* stepper */
  .stepper{display:inline-flex;align-items:center;background:var(--surface-subtle);border-radius:var(--radius-comfortable);overflow:hidden}
  .stepper button{border:0;width:40px;height:40px;background:transparent;font-family:var(--font-sans);font-size:18px;font-weight:600;color:var(--action-primary);cursor:default}
  .stepper button:disabled{color:var(--text-disabled)}
  .stepper .v{min-width:44px;text-align:center;font-size:16px;font-weight:600;font-variant-numeric:tabular-nums}
  /* numeric spinner */
  .spinner{display:inline-flex;flex-direction:column;gap:2px}
  .spinner .win{display:flex;gap:4px}
  .spinner .digit{width:36px;height:48px;border-radius:var(--radius-standard);background:var(--surface-panel);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .spinner .digit.active{border-color:var(--focus-ring);box-shadow:0 0 0 3px var(--focus-ring-soft)}
  .spinner .hint{font-size:12px;color:var(--text-faint);margin-top:6px}
  /* rating */
  .stars{display:inline-flex;gap:4px}
  .stars svg{width:28px;height:28px}
  .stars .on{fill:var(--yellow-500)}
  .stars .off{fill:var(--grey-200)}
  .rate-cap{font-size:13px;color:var(--text-muted);margin-left:10px;vertical-align:8px}
</style>
</head>
<body>

  <div class="card">
    <p class="label">Slider — 60 of 0–100</p>
    <div class="slider">
      <div class="track"></div>
      <div class="fill" style="width:60%"></div>
      <div class="thumb" style="left:60%"></div>
      <div class="vals"><span>0</span><span>100</span></div>
    </div>
  </div>

  <div class="card" style="display:flex;gap:40px;flex-wrap:wrap;align-items:flex-start">
    <div>
      <p class="label">Stepper</p>
      <div class="stepper">
        <button>−</button>
        <span class="v">2</span>
        <button>＋</button>
      </div>
    </div>
    <div>
      <p class="label">Stepper — at minimum</p>
      <div class="stepper">
        <button disabled>−</button>
        <span class="v">0</span>
        <button>＋</button>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="label">Numeric spinner — code entry</p>
    <div class="spinner">
      <div class="win">
        <span class="digit">4</span>
        <span class="digit">7</span>
        <span class="digit active"></span>
        <span class="digit"></span>
      </div>
      <span class="hint">Enter the 4-digit code we sent you</span>
    </div>
  </div>

  <div class="card">
    <p class="label">Rating — 4 of 5</p>
    <span class="stars" role="img" aria-label="4 out of 5 stars">
      <svg viewBox="0 0 24 24" class="on"><path class="on" d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.2 5.9 20.6l1.4-6.8L2.2 9.1l6.9-.8z"/></svg>
      <svg viewBox="0 0 24 24" class="on"><path class="on" d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.2 5.9 20.6l1.4-6.8L2.2 9.1l6.9-.8z"/></svg>
      <svg viewBox="0 0 24 24" class="on"><path class="on" d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.2 5.9 20.6l1.4-6.8L2.2 9.1l6.9-.8z"/></svg>
      <svg viewBox="0 0 24 24" class="on"><path class="on" d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.2 5.9 20.6l1.4-6.8L2.2 9.1l6.9-.8z"/></svg>
      <svg viewBox="0 0 24 24" class="off"><path class="off" d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.2 5.9 20.6l1.4-6.8L2.2 9.1l6.9-.8z"/></svg>
    </span>
    <span class="rate-cap">Tap to rate</span>
  </div>

</body>
</html>
