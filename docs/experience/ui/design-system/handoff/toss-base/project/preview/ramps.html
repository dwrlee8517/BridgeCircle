<!-- @dsCard group="Colors" name="Color ramps" subtitle="8 TDS families — grey · blue · red · orange · yellow · green · teal · purple, 10 stops each" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-page);font-family:var(--font-sans);color:var(--text-primary)}
  h1{font-size:15px;font-weight:700;margin:0 0 4px;letter-spacing:-0.02em}
  p.note{font-size:12px;color:var(--text-muted);margin:0 0 18px}
  .ramp{display:grid;grid-template-columns:64px repeat(10,1fr);gap:4px;align-items:center;margin-bottom:10px}
  .ramp b{font-size:12px;font-weight:700;color:var(--text-secondary);text-transform:capitalize}
  .stop{height:44px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:4px 6px;box-sizing:border-box}
  .stop span{font-size:9px;font-weight:600;opacity:.9}
</style>
</head>
<body>
  <h1>TDS ramps — faithful (Layer 0)</h1>
  <p class="note">Eight families straight from @toss/tds. Grey is the spine; blue is the one action color. Warm + cool hues are semantic only — never action buttons. Text/fill pair from the same ramp.</p>
  <div id="ramps"></div>
  <script>
    const ramps = {
      grey:   ['#f9fafb','#f2f4f6','#e5e8eb','#d1d6db','#b0b8c1','#8b95a1','#6b7684','#4e5968','#333d4b','#191f28'],
      blue:   ['#e8f3ff','#c9e2ff','#90c2ff','#64a8ff','#4593fc','#3182f6','#2272eb','#1b64da','#1957c2','#194aa6'],
      red:    ['#ffeeee','#ffd4d6','#feafb4','#fb8890','#f66570','#f04452','#e42939','#d22030','#bc1b2a','#a51926'],
      orange: ['#fff3e0','#ffe0b0','#ffcd80','#ffbd51','#ffa927','#fe9800','#fb8800','#f57800','#ed6700','#e45600'],
      yellow: ['#fff9e7','#ffefbf','#ffe69b','#ffdd78','#ffd158','#ffc342','#ffb331','#faa131','#ee8f11','#dd7d02'],
      green:  ['#f0faf6','#aeefd5','#76e4b8','#3fd599','#15c47e','#03b26c','#02a262','#029359','#028450','#027648'],
      teal:   ['#edf8f8','#bce9e9','#89d8d8','#58c7c7','#30b6b6','#18a5a5','#109595','#0c8585','#097575','#076565'],
      purple: ['#f9f0fc','#edccf8','#da9bef','#c770e4','#b44bd7','#a234c7','#9128b4','#8222a2','#73228e','#65237b'],
    }
    const stops = [50,100,200,300,400,500,600,700,800,900]
    const host = document.getElementById('ramps')
    for (const [name, hexes] of Object.entries(ramps)) {
      const row = document.createElement('div')
      row.className = 'ramp'
      row.innerHTML = `<b>${name}</b>` + hexes.map((h,i) =>
        `<div class="stop" style="background:${h};color:${i<5?'#191f28':'#ffffff'}"><span>${stops[i]}</span></div>`
      ).join('')
      host.appendChild(row)
    }
  </script>
</body>
</html>
