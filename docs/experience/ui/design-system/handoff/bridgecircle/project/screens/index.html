<!-- @dsCard group="Screens" name="Screen handoff gallery" subtitle="Canonical page-and-flow review index" viewport-width="1440" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BridgeCircle screen handoff</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;font-family:var(--font-sans);color:var(--text-primary);background:#e9edf3}
  body{display:grid;grid-template-columns:286px minmax(0,1fr);min-height:100vh}
  .review-nav{background:#111722;color:#fff;padding:24px 18px;display:flex;flex-direction:column;gap:20px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;letter-spacing:-.02em}
  .mark{width:28px;height:28px;position:relative;display:inline-block}
  .mark::before,.mark::after{content:"";position:absolute;top:5px;width:16px;height:16px;border:1.7px solid;border-radius:50%}
  .mark::before{left:1px;color:#fff}.mark::after{left:10px;color:#64a8ff}
  .eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8f9bae;margin:0 0 8px}
  .review-nav h1{font-size:24px;line-height:1.15;letter-spacing:-.03em;margin:0}
  .review-nav p{font-size:13px;line-height:1.55;color:#aeb8c7;margin:8px 0 0}
  .screen-list{display:flex;flex-direction:column;gap:6px}
  .screen-link{width:100%;border:0;background:transparent;color:#b7c0ce;padding:11px 12px;border-radius:12px;text-align:left;font:600 13px/1.3 var(--font-sans);cursor:pointer;display:flex;align-items:center;gap:10px}
  .screen-link:hover{background:rgb(255 255 255/.07);color:#fff}
  .screen-link[aria-current="true"]{background:linear-gradient(135deg,rgb(49 130 246/.28),rgb(49 130 246/.12));color:#fff}
  .screen-link .num{width:24px;height:24px;border-radius:8px;background:rgb(255 255 255/.08);display:grid;place-items:center;font-size:10px;color:#91bfff}
  .screen-link span:last-child{display:flex;flex-direction:column;gap:2px}
  .screen-link small{font-weight:500;color:#7f8b9d}
  .status{margin-top:auto;padding:14px;border:1px solid rgb(255 255 255/.09);border-radius:14px;background:rgb(255 255 255/.04)}
  .status strong{display:block;font-size:12px}.status span{display:block;font-size:11px;color:#8f9bae;margin-top:5px;line-height:1.45}
  .review-main{min-width:0;display:flex;flex-direction:column;height:100vh}
  .review-bar{height:62px;flex:none;background:#fff;border-bottom:1px solid #dfe4eb;display:flex;align-items:center;padding:0 22px;gap:12px}
  .review-bar strong{font-size:14px}.review-bar .route{font:600 11px/1 ui-monospace,SFMono-Regular,Menlo,monospace;color:#647084;background:#f1f4f8;border-radius:7px;padding:6px 9px}
  .review-bar .draft{margin-left:auto;font-size:11px;font-weight:700;color:#1b64da;background:#e8f3ff;border-radius:999px;padding:5px 10px}
  .viewport-switch{display:flex;background:#eef1f5;border-radius:9px;padding:2px;margin-left:auto}
  .viewport-button{border:0;background:transparent;color:#6b7684;border-radius:7px;padding:6px 9px;font:700 10px/1 var(--font-sans);cursor:pointer}
  .viewport-button.active{background:#fff;color:#191f28;box-shadow:0 1px 3px rgb(25 31 40/.12)}
  .review-bar .draft{margin-left:0}
  .viewport{flex:1;min-height:0;padding:18px;background:radial-gradient(circle at 50% 0,#f7f9fc,#e5eaf1 68%);display:flex;justify-content:center;align-items:stretch;overflow:auto}
  iframe{width:100%;height:100%;border:0;border-radius:16px;background:#fff;box-shadow:0 18px 50px -24px rgb(25 31 40/.42),0 0 0 1px rgb(25 31 40/.08)}
  @media(max-width:900px){body{grid-template-columns:1fr}.review-nav{position:static;height:auto}.review-main{height:760px}.screen-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}.status{display:none}}
</style>
</head>
<body>
  <aside class="review-nav">
    <div class="brand"><span class="mark" aria-hidden="true"></span>BridgeCircle</div>
    <div>
      <p class="eyebrow">Design handoff</p>
      <h1>People + Profile</h1>
      <p>The first complete page slice, grounded in FLOWS.md and the BridgeCircle fork.</p>
    </div>
    <nav class="screen-list" aria-label="Mockup screens">
      <button class="screen-link" aria-current="true" data-src="people-directory.html" data-title="People directory" data-route="/people"><span class="num">01</span><span>People directory<small>50-result cap · 20 per page</small></span></button>
      <button class="screen-link" data-src="people-profile-overlay.html?person=maya" data-title="Member profile" data-route="/people/[id]"><span class="num">02</span><span>Member profile<small>Editorial sections, Ask, Connect</small></span></button>
      <button class="screen-link" data-src="people-profile-overlay.html?person=jordan&amp;connect=1" data-title="Connect introduction" data-route="/people/[id] · connect"><span class="num">03</span><span>Connect moment<small>Quick hello or shaped intro</small></span></button>
      <button class="screen-link" data-src="profile-self.html" data-title="Self profile" data-route="/profile"><span class="num">04</span><span>Self profile<small>Edit, freshness, visibility</small></span></button>
      <button class="screen-link" data-src="people-directory-system-states.html" data-title="People system states" data-route="/people · states"><span class="num">05</span><span>People states<small>No results, loading, failed</small></span></button>
      <button class="screen-link" data-src="people-profile-system-states.html" data-title="Profile system states" data-route="/people/[id] · unavailable"><span class="num">06</span><span>Profile states<small>Gone, private, blocked</small></span></button>
    </nav>
    <div class="status"><strong>First slice · Draft</strong><span>Desktop, tablet, and mobile profile paths are included for review.</span></div>
  </aside>
  <main class="review-main">
    <header class="review-bar"><strong id="screen-title">People directory</strong><span class="route" id="screen-route">/people</span><div class="viewport-switch" aria-label="Preview width"><button class="viewport-button active" data-width="100%">Fit</button><button class="viewport-button" data-width="768px">Tablet</button><button class="viewport-button" data-width="390px">Mobile</button></div><span class="draft">Draft for review</span></header>
    <div class="viewport"><iframe id="screen-frame" title="BridgeCircle mockup" src="people-directory.html"></iframe></div>
  </main>
<script>
  const frame=document.querySelector('#screen-frame');
  const title=document.querySelector('#screen-title');
  const route=document.querySelector('#screen-route');
  document.querySelectorAll('.screen-link').forEach((button)=>{
    button.addEventListener('click',()=>{
      document.querySelectorAll('.screen-link').forEach((item)=>item.removeAttribute('aria-current'));
      button.setAttribute('aria-current','true');
      frame.src=button.dataset.src;
      title.textContent=button.dataset.title;
      route.textContent=button.dataset.route;
    });
  });
  document.querySelectorAll('.viewport-button').forEach((button)=>{
    button.addEventListener('click',()=>{
      document.querySelectorAll('.viewport-button').forEach((item)=>item.classList.toggle('active',item===button));
      frame.style.width=button.dataset.width;
      frame.style.flex=button.dataset.width==='100%'?'1 1 auto':'0 0 auto';
    });
  });
</script>
</body>
</html>
