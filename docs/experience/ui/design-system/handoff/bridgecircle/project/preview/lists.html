<!-- @dsCard group="Components" name="Lists" subtitle="ListRow variants · list header/footer · grid list" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-page);font-family:var(--font-sans);color:var(--text-primary);display:grid;gap:14px}
  .card{background:var(--surface-card);border-radius:var(--radius-large);box-shadow:var(--ring-card),var(--shadow-card);padding:6px 20px}
  .lh{display:flex;align-items:baseline;justify-content:space-between;padding:14px 0 6px}
  .lh b{font-size:17px;font-weight:700;letter-spacing:-0.015em}
  .lh a{font-size:13px;font-weight:600;color:var(--link);text-decoration:none}
  .row{display:flex;gap:12px;align-items:center;padding:13px 0;border-bottom:1px solid var(--divider)}
  .row:last-of-type{border-bottom:0}
  .avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
  .ic{width:40px;height:40px;border-radius:var(--radius-comfortable);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
  .m{flex:1;min-width:0}
  .m .t{font-size:15px;font-weight:600}
  .m .s{display:block;font-size:13px;color:var(--text-faint)}
  .val{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums}
  .val.pos{color:var(--state-success-text)}
  .chev{color:var(--border-strong);font-size:18px}
  .pill{border-radius:var(--radius-pill);padding:4px 11px;font-size:12px;font-weight:600}
  .btn-sm{border:0;border-radius:var(--radius-standard);padding:8px 14px;font-family:var(--font-sans);font-size:13px;font-weight:600;background:var(--action-weak);color:var(--action-weak-text)}
  .lf{padding:12px 0 14px;text-align:center;font-size:14px;font-weight:600;color:var(--link)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:6px 0 16px}
  .cell{background:var(--surface-panel);border-radius:var(--radius-comfortable);padding:14px 12px;text-align:center}
  .cell .gi{width:40px;height:40px;border-radius:50%;margin:0 auto 8px;background:var(--action-weak);color:var(--action-weak-text);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
  .cell .gt{font-size:13px;font-weight:600}
  .cell .gs{font-size:11px;color:var(--text-faint)}
</style>
</head>
<body>

  <div class="card">
    <div class="lh"><b>People</b><a href="#" onclick="return false">See all</a></div>
    <div class="row">
      <span class="avatar" style="background:var(--action-weak);color:var(--action-weak-text)">IL</span>
      <span class="m"><span class="t">Iris Lau</span><span class="s">Class of 2022 · Product design</span></span>
      <button class="btn-sm">Connect</button>
    </div>
    <div class="row">
      <span class="avatar" style="background:var(--state-info-tint);color:var(--state-info-text)">DO</span>
      <span class="m"><span class="t">David Okafor</span><span class="s">Class of 1998 · Engineering lead</span></span>
      <button class="btn-sm">Connect</button>
    </div>
    <div class="lf">Show 12 more</div>
  </div>

  <div class="card">
    <div class="lh"><b>Activity</b></div>
    <div class="row">
      <span class="ic" style="background:var(--state-success-tint);color:var(--state-success-text)">↓</span>
      <span class="m"><span class="t">Offer received</span><span class="s">Portfolio feedback · Tuesday</span></span>
      <span class="val pos">+1</span>
    </div>
    <div class="row">
      <span class="ic" style="background:var(--surface-subtle);color:var(--text-muted)">↗</span>
      <span class="m"><span class="t">Ask sent</span><span class="s">Sublet advice · yesterday</span></span>
      <span class="chev">›</span>
    </div>
    <div class="row">
      <span class="ic" style="background:var(--state-warning-tint);color:var(--state-warning-text)">!</span>
      <span class="m"><span class="t">Ask expiring</span><span class="s">2 days left</span></span>
      <span class="pill" style="background:var(--state-warning-tint);color:var(--state-warning-text)">Renew</span>
    </div>
  </div>

  <div class="card">
    <div class="lh"><b>Grid list</b></div>
    <div class="grid">
      <div class="cell"><span class="gi">JK</span><span class="gt">Jamie Kim</span><span class="gs">'15</span></div>
      <div class="cell"><span class="gi" style="background:var(--state-info-tint);color:var(--state-info-text)">MP</span><span class="gt">Mina Park</span><span class="gs">'15</span></div>
      <div class="cell"><span class="gi" style="background:var(--surface-subtle);color:var(--text-muted)">SL</span><span class="gt">Sam Lee</span><span class="gs">'19</span></div>
    </div>
  </div>

</body>
</html>
