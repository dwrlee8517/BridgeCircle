<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <script src="./ds-base.js"></script>
  <script src="../app-shell/account-menu.js"></script>
  <script src="./school-data.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>body{margin:0;background:var(--surface-page);font-family:var(--font-sans);color:var(--text-primary);-webkit-font-smoothing:antialiased;overflow:hidden} a{color:var(--link);text-decoration:none} a:hover{color:var(--link-hover)} input,textarea,button{font-family:var(--font-sans)}</style>
</helmet>

<div style="display:flex;height:100vh;max-width:var(--container-shell);margin:0 auto" data-screen-label="School — announcements">

  <aside style="width:var(--sidebar-width);flex:none;height:100vh;box-sizing:border-box;background:var(--surface-card);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;padding:22px 16px">
    <span style="display:flex;align-items:center;gap:9px;padding:6px 10px 26px;font-size:18px;font-weight:800;letter-spacing:-0.02em">
      <svg width="26" height="26" viewBox="0 0 28 28" style="flex:none"><circle cx="11" cy="14" r="9" fill="none" stroke="#191f28" stroke-width="1.7"></circle><circle cx="17" cy="14" r="9" fill="none" stroke="#3182f6" stroke-width="1.7"></circle></svg>
      BridgeCircle
    </span>
    <nav style="display:flex;flex-direction:column;gap:3px">
      <a href="../home/Home.dc.html" style="display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--radius-box);font-size:15px;font-weight:600;color:var(--text-secondary);text-decoration:none;cursor:pointer" style-hover="background:var(--hover-tint)" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px">
        <svg viewBox="0 0 24 24" style="width:20px;height:20px;flex:none;fill:none;stroke:var(--text-faint);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round"><path d="M3 10.5 12 3l9 7.5"></path><path d="M5 9v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9"></path><path d="M9 21v-6h6v6"></path></svg>
        Home
      </a>
      <a href="../help/Help.dc.html" style="display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--radius-box);font-size:15px;font-weight:600;color:var(--text-secondary);text-decoration:none;cursor:pointer" style-hover="background:var(--hover-tint)" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px">
        <svg viewBox="0 0 24 24" style="width:20px;height:20px;flex:none;fill:none;stroke:var(--text-faint);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round"><path d="M11 14h2a2 2 0 0 0 2-2 2 2 0 0 0-2-2H9.5c-.6 0-1.1.2-1.4.6L3 16"></path><path d="m7 20 1.6-1.4c.3-.4.8-.6 1.4-.6h4c1.1 0 2.1-.4 2.8-1.2l4.6-4.4a2 2 0 0 0-2.75-2.91l-4.2 3.9"></path><path d="m2 15 6 6"></path></svg>
        Help
      </a>
      <a href="../people/People.dc.html" style="display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--radius-box);font-size:15px;font-weight:600;color:var(--text-secondary);text-decoration:none;cursor:pointer" style-hover="background:var(--hover-tint)" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px">
        <svg viewBox="0 0 24 24" style="width:20px;height:20px;flex:none;fill:none;stroke:var(--text-faint);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round"><circle cx="9" cy="8" r="3"></circle><path d="M3 20a6 6 0 0 1 12 0"></path><circle cx="17.5" cy="9.5" r="2.2"></circle><path d="M15 20a4.5 4.5 0 0 1 6.8-3.9"></path></svg>
        People
      </a>
      <a href="../messages/Messages.dc.html" style="display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--radius-box);font-size:15px;font-weight:600;color:var(--text-secondary);text-decoration:none;cursor:pointer" style-hover="background:var(--hover-tint)" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px">
        <svg viewBox="0 0 24 24" style="width:20px;height:20px;flex:none;fill:none;stroke:var(--text-faint);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round"><path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.4 8.4 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.4 8.4 0 0 1 21 11.5z"></path></svg>
        <span style="flex:1">Messages</span>
        <span style="font-size:12px;background:var(--action-primary);color:#fff;font-weight:700;border-radius:var(--radius-pill);padding:1px 8px">3</span>
      </a>
      <a href="./School.dc.html" aria-current="page" style="display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--radius-box);font-size:15px;font-weight:700;color:var(--nav-active-text);background:var(--nav-active-bg);text-decoration:none;cursor:pointer" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px">
        <svg viewBox="0 0 24 24" style="width:20px;height:20px;flex:none;fill:none;stroke:currentColor;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round"><path d="M12 4 2 9l10 5 10-5-10-5z"></path><path d="M6 11.5V16a6 3 0 0 0 12 0v-4.5"></path></svg>
        School
      </a>
    </nav>
    <span style="margin-top:auto;display:flex;align-items:center;gap:11px;padding:14px 8px 4px;border-radius:var(--radius-box)">
      <span style="width:36px;height:36px;border-radius:50%;background:var(--gradient-avatar);box-shadow:inset 0 0 0 1px rgb(255 255 255 / 0.2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex:none">IL</span>
      <span><span style="display:block;font-size:14px;font-weight:700;line-height:1.25">Iris Lau</span><span style="display:block;font-size:12px;color:var(--text-faint);font-weight:600;font-variant-numeric:tabular-nums">Class of &rsquo;22</span></span>
    </span>
  </aside>

  <main style="flex:1;min-width:0;display:flex;flex-direction:column;height:100vh">
    <header style="flex:none;height:var(--topbar-height);box-sizing:border-box;background:rgb(255 255 255 / 0.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:13px;padding:0 26px;z-index:2">
      <a href="./School.dc.html" aria-label="Back to School" style="width:38px;height:38px;border-radius:var(--radius-pill);background:var(--surface-subtle);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none" style-hover="background:var(--grey-200)" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px">
        <svg viewBox="0 0 24 24" style="width:17px;height:17px;fill:none;stroke:var(--text-secondary);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><path d="m14 6-6 6 6 6"></path></svg>
      </a>
      <span style="font-size:18px;font-weight:700;letter-spacing:-0.02em">Announcements</span>
      <span style="font-size:12.5px;color:var(--text-faint);font-weight:600;font-variant-numeric:tabular-nums">&middot; {{ countLabel }}</span>
      <span style="margin-left:auto"><bc-account-menu></bc-account-menu></span>
    </header>

    <div style="flex:1;min-height:0;overflow-y:auto;background:var(--wash-page)">
      <div style="max-width:var(--container-reading);margin:0 auto;padding:26px 26px 44px">

        <span style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
          <sc-for list="{{ chips }}" as="c" hint-placeholder-count="5">
            <sc-if value="{{ c.on }}" hint-placeholder-val="{{ false }}">
              <button style="border:0;background:rgb(49 130 246 / 0.12);color:var(--blue-600);border-radius:var(--radius-pill);padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer">{{ c.label }}</button>
            </sc-if>
            <sc-if value="{{ c.off }}" hint-placeholder-val="{{ true }}">
              <button onClick="{{ c.pick }}" style="border:0;background:var(--surface-subtle);color:var(--text-secondary);border-radius:var(--radius-pill);padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer" style-hover="background:var(--grey-200)" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px">{{ c.label }}</button>
            </sc-if>
          </sc-for>
        </span>

        <div style="background:var(--surface-card-elevated);border-radius:var(--radius-card-xl);overflow:hidden;box-shadow:var(--ring-card-elevated),var(--shadow-card-elevated)">
          <sc-if value="{{ pinnedShow }}" hint-placeholder-val="{{ true }}">
            <a href="{{ pinnedHref }}" style="display:block;padding:13px 22px 13px 20px;background:linear-gradient(90deg,#eaf3ff,#fbfdff);box-shadow:inset 3px 0 0 var(--action-primary);color:inherit;text-decoration:none;cursor:pointer" style-focus="outline:2px solid var(--focus-ring);outline-offset:-2px">
              <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--blue-600)"><svg viewBox="0 0 24 24" style="width:12px;height:12px;flex:none;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round"><path d="M9 4h6l-.8 5.2 3.3 3.3H6.5l3.3-3.3L9 4z"></path><path d="M12 12.5V20"></path></svg>Pinned</span>
              <span style="display:block;font-size:14px;font-weight:700;line-height:1.4;margin-top:3px;color:var(--text-primary)">{{ pinnedTitle }}</span>
              <span style="display:block;font-size:12px;color:var(--text-faint);font-weight:500;margin-top:2px">{{ pinnedMeta }}</span>
            </a>
          </sc-if>
          <sc-for list="{{ rows }}" as="n" hint-placeholder-count="4">
            <a href="{{ n.href }}" style="display:flex;align-items:center;gap:12px;padding:13px 22px;border-top:1px solid var(--divider-row);color:inherit;text-decoration:none;cursor:pointer" style-hover="background:var(--row-hover)" style-focus="outline:2px solid var(--focus-ring);outline-offset:-2px">
              <span style="flex:1;min-width:0">
                <span style="display:flex;align-items:center;gap:7px">
                  <sc-if value="{{ n.unread }}" hint-placeholder-val="{{ false }}">
                    <i style="flex:none;width:7px;height:7px;border-radius:50%;background:var(--action-primary)"></i>
                  </sc-if>
                  <span style="font-size:14px;font-weight:700;line-height:1.4;color:var(--text-primary)">{{ n.title }}</span>
                </span>
                <span style="display:block;font-size:12px;color:var(--text-faint);font-weight:500;margin-top:2px">{{ n.meta }}</span>
              </span>
              <span aria-hidden="true" style="flex:none;color:var(--grey-400);font-size:16px;font-weight:700">&rsaquo;</span>
            </a>
          </sc-for>
          <sc-if value="{{ emptyShow }}" hint-placeholder-val="{{ false }}">
            <p style="margin:0;padding:22px;text-align:center;font-size:12.5px;color:var(--text-faint);font-weight:600;border-top:1px solid var(--divider-row)">Nothing under that tag yet.</p>
          </sc-if>
        </div>

      </div>
    </div>
  </main>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { filter: 'All', read: {} };

  componentDidMount() {
    try { this.setState({ read: JSON.parse(sessionStorage.getItem('bcAnnRead') || '{}') }); } catch (e) { /* ignore */ }
    if (!window.BCSchoolData) {
      this._poll = setInterval(() => { if (window.BCSchoolData) { clearInterval(this._poll); this._poll = null; this.forceUpdate(); } }, 80);
    }
  }

  componentWillUnmount() { if (this._poll) clearInterval(this._poll); }

  data() { return window.BCSchoolData || { announcements: [] }; }

  renderVals() {
    const s = this.state;
    const anns = this.data().announcements || [];
    const tags = ['All', 'Mentorship', 'Hiring', 'Reunion', 'General'];
    const chips = tags.map((t) => ({
      label: t, on: s.filter === t, off: s.filter !== t,
      pick: () => this.setState({ filter: t })
    }));

    const pinned = anns.find((a) => a.pinned);
    const rows = anns
      .filter((a) => !a.pinned)
      .filter((a) => s.filter === 'All' || a.tag === s.filter)
      .map((a) => ({
        title: a.title,
        unread: !!a.unread && !s.read[a.id],
        meta: a.tag + ' \u00b7 ' + a.date,
        href: './AnnouncementRead.dc.html?id=' + a.id
      }));

    return {
      countLabel: anns.length + ' this term',
      chips,
      pinnedShow: !!pinned,
      pinnedTitle: pinned ? pinned.title : '',
      pinnedMeta: pinned ? pinned.tag + ' \u00b7 ' + pinned.date + ' \u00b7 held on top' : '',
      pinnedHref: pinned ? './AnnouncementRead.dc.html?id=' + pinned.id : '#',
      rows,
      emptyShow: rows.length === 0
    };
  }
}
</script>
</body>
</html>
