<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BridgeCircle — App UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; }
  body { background: #fafaf9; color: #0c0c0b; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #dcdcd6; border-radius: 3px; }
  input, textarea, select, button { font-family: inherit; }
  /* Announcement banner */
  .bc-announcement { display: flex; align-items: center; justify-content: space-between; padding: 8px 32px; border-bottom: 1px solid #dcdcd6; background: rgba(37,99,235,0.03); font-size: 12px; cursor: pointer; transition: background 150ms; }
  .bc-announcement:hover { background: rgba(37,99,235,0.06); }
  /* Section kicker */
  .bc-section-kicker { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #2563eb; }
  .bc-section-kicker::before { content: ''; display: block; width: 1.75rem; height: 2px; border-radius: 999px; background: #2563eb; }
  /* Page band */
  .bc-page-band { background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,0)), radial-gradient(circle at 12% 0%, rgba(37,99,235,.07), transparent 32%), #fafaf9; }
  /* Action rail */
  .bc-action-rail { border-left: 3px solid #2563eb; background: color-mix(in srgb, #2563eb 5%, #fff); }
  /* Pull quote */
  .bc-pull-quote { border-left: 3px solid #2563eb; padding-left: 10px; font-style: italic; line-height: 1.5; }
  /* Person card hover-lift (interaction echoes the production ResultCard) */
  .bc-person-card--lift:hover { transform: translateY(-1px); border-color: #0c0c0b !important; box-shadow: 0 4px 12px -2px rgba(12,12,11,0.06) !important; }
  #root { height: 100%; display: flex; flex-direction: column; }

  /* ─── Responsive helpers ─────────────────────────────────────────────── */
  .bc-mobile-only { display: none; }
  .bc-mobile-tabbar { display: none; }

  /* ─── Stripe color theme ──────────────────────────────────────────────────
     Layered on top of the BridgeCircle palette by attribute selectors.
     NOTE: browsers normalize inline-style hex colors to rgb(...) form, so the
     selectors below must match against rgb()/rgba() — NOT the hex source.
     Brand: #635BFF (Stripe purple)  ·  Bg: #F6F9FC  ·  Border: #E3E8EE */
  body.theme-stripe { background: #F6F9FC !important; }
  body.theme-stripe .bc-section-kicker            { color: #635BFF; }
  body.theme-stripe .bc-section-kicker::before    { background: #635BFF; }
  body.theme-stripe .bc-page-band {
    background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,0)),
                radial-gradient(circle at 12% 0%, rgba(99,91,255,.07), transparent 32%),
                #F6F9FC;
  }
  body.theme-stripe .bc-action-rail   { border-left-color: #635BFF; background: color-mix(in srgb, #635BFF 5%, #fff); }
  body.theme-stripe .bc-pull-quote    { border-left-color: #635BFF; }

  /* Primary brand #2563eb → #635BFF.  In the DOM this serializes as
     rgb(37, 99, 235) (with the canonical comma+space). */
  body.theme-stripe [style*="color: rgb(37, 99, 235)"]              { color: #635BFF !important; }
  body.theme-stripe [style*="background: rgb(37, 99, 235)"],
  body.theme-stripe [style*="background-color: rgb(37, 99, 235)"]   { background-color: #635BFF !important; }
  body.theme-stripe [style*="border-color: rgb(37, 99, 235)"],
  body.theme-stripe [style*="solid rgb(37, 99, 235)"]               { border-color: #635BFF !important; }
  /* SVG attributes are NOT normalized — match as written. */
  body.theme-stripe [stroke="#2563eb"]   { stroke: #635BFF !important; }
  body.theme-stripe [fill="#2563eb"]     { fill: #635BFF !important; }

  /* Translucent brand rgba(37,99,235,X) — back the tint with purple. */
  body.theme-stripe [style*="background: rgba(37, 99, 235"],
  body.theme-stripe [style*="background-color: rgba(37, 99, 235"]   { background-color: rgba(99,91,255,0.10) !important; }
  body.theme-stripe [style*="solid rgba(37, 99, 235"]               { border-color: rgba(99,91,255,0.28) !important; }

  /* Page surfaces: warm bone (#fafaf9 / #f4f3ee) → Stripe's cool pale. */
  body.theme-stripe [style*="background: rgb(250, 250, 249)"],
  body.theme-stripe [style*="background-color: rgb(250, 250, 249)"] { background-color: #F6F9FC !important; }
  body.theme-stripe [style*="background: rgb(244, 243, 238)"],
  body.theme-stripe [style*="background-color: rgb(244, 243, 238)"] { background-color: #F7FAFC !important; }

  /* Hairline borders (#dcdcd6 / #ebebe5) shift cool. */
  body.theme-stripe [style*="solid rgb(220, 220, 214)"]             { border-color: #E3E8EE !important; }
  body.theme-stripe [style*="solid rgb(235, 235, 229)"]             { border-color: #EFF3F7 !important; }

  /* ─── Apple color theme ────────────────────────────────────────────────────
     Brand: #0071e3 (system blue)  ·  Bg: #f5f5f7  ·  Border: #d2d2d7 */
  body.theme-apple { background: #f5f5f7 !important; }
  body.theme-apple .bc-section-kicker            { color: #0071e3; }
  body.theme-apple .bc-section-kicker::before    { background: #0071e3; }
  body.theme-apple .bc-page-band {
    background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,0)),
                radial-gradient(circle at 12% 0%, rgba(0,113,227,.07), transparent 32%),
                #f5f5f7;
  }
  body.theme-apple .bc-action-rail   { border-left-color: #0071e3; background: color-mix(in srgb, #0071e3 5%, #fff); }
  body.theme-apple .bc-pull-quote    { border-left-color: #0071e3; }

  body.theme-apple [style*="color: rgb(37, 99, 235)"]              { color: #0071e3 !important; }
  body.theme-apple [style*="background: rgb(37, 99, 235)"],
  body.theme-apple [style*="background-color: rgb(37, 99, 235)"]   { background-color: #0071e3 !important; }
  body.theme-apple [style*="border-color: rgb(37, 99, 235)"],
  body.theme-apple [style*="solid rgb(37, 99, 235)"]               { border-color: #0071e3 !important; }
  body.theme-apple [stroke="#2563eb"]   { stroke: #0071e3 !important; }
  body.theme-apple [fill="#2563eb"]     { fill: #0071e3 !important; }

  body.theme-apple [style*="background: rgba(37, 99, 235"],
  body.theme-apple [style*="background-color: rgba(37, 99, 235"]   { background-color: rgba(0,113,227,0.10) !important; }
  body.theme-apple [style*="solid rgba(37, 99, 235"]               { border-color: rgba(0,113,227,0.28) !important; }

  body.theme-apple [style*="background: rgb(250, 250, 249)"],
  body.theme-apple [style*="background-color: rgb(250, 250, 249)"] { background-color: #f5f5f7 !important; }
  body.theme-apple [style*="background: rgb(244, 243, 238)"],
  body.theme-apple [style*="background-color: rgb(244, 243, 238)"] { background-color: #fbfbfd !important; }

  body.theme-apple [style*="solid rgb(220, 220, 214)"]             { border-color: #d2d2d7 !important; }
  body.theme-apple [style*="solid rgb(235, 235, 229)"]             { border-color: #e5e5ea !important; }

  /* ─── Spotify color theme ──────────────────────────────────────────────────
     (Renamed → Instagram. Kept here as dead block in case anything still
     references theme-spotify; no body should ever carry that class now.) */

  /* ─── Instagram color theme ───────────────────────────────────────────────
     Brand: #E1306C (Instagram magenta)  ·  Gradient: orange → red → purple
     Bg: #fafafa  ·  Border: #dbdbdb  ·  Cards stay pure white */
  body.theme-instagram { background: #fafafa !important; }
  body.theme-instagram .bc-section-kicker            { color: #E1306C; }
  body.theme-instagram .bc-section-kicker::before    {
    background: linear-gradient(90deg, #FCB045, #FD1D1D 60%, #833AB4);
  }
  body.theme-instagram .bc-page-band {
    background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,0)),
                radial-gradient(circle at 12% 0%, rgba(225,48,108,.08), transparent 32%),
                radial-gradient(circle at 88% 100%, rgba(252,176,69,.07), transparent 38%),
                #fafafa;
  }
  body.theme-instagram .bc-action-rail {
    border-left: 3px solid transparent;
    border-image: linear-gradient(180deg, #FCB045, #FD1D1D 55%, #833AB4) 1;
    background: color-mix(in srgb, #E1306C 5%, #fff);
  }
  body.theme-instagram .bc-pull-quote { border-left-color: #E1306C; }
  body.theme-instagram .bc-announcement { background: rgba(225,48,108,0.04) !important; }
  body.theme-instagram .bc-announcement:hover { background: rgba(225,48,108,0.07) !important; }

  body.theme-instagram [style*="color: rgb(37, 99, 235)"]              { color: #E1306C !important; }
  body.theme-instagram [style*="background: rgb(37, 99, 235)"],
  body.theme-instagram [style*="background-color: rgb(37, 99, 235)"]   { background-color: #E1306C !important; }
  body.theme-instagram [style*="border-color: rgb(37, 99, 235)"],
  body.theme-instagram [style*="solid rgb(37, 99, 235)"]               { border-color: #E1306C !important; }
  body.theme-instagram [stroke="#2563eb"]   { stroke: #E1306C !important; }
  body.theme-instagram [fill="#2563eb"]     { fill: #E1306C !important; }

  body.theme-instagram [style*="background: rgba(37, 99, 235"],
  body.theme-instagram [style*="background-color: rgba(37, 99, 235"]   { background-color: rgba(225,48,108,0.10) !important; }
  body.theme-instagram [style*="solid rgba(37, 99, 235"]               { border-color: rgba(225,48,108,0.28) !important; }

  body.theme-instagram [style*="background: rgb(250, 250, 249)"],
  body.theme-instagram [style*="background-color: rgb(250, 250, 249)"] { background-color: #fafafa !important; }
  body.theme-instagram [style*="background: rgb(244, 243, 238)"],
  body.theme-instagram [style*="background-color: rgb(244, 243, 238)"] { background-color: #f5f5f5 !important; }
  /* Subtle gray surface (#ebebe5) → cool gray */
  body.theme-instagram [style*="background: rgb(235, 235, 229)"],
  body.theme-instagram [style*="background-color: rgb(235, 235, 229)"] { background-color: #efefef !important; }

  body.theme-instagram [style*="solid rgb(220, 220, 214)"]             { border-color: #dbdbdb !important; }
  body.theme-instagram [style*="solid rgb(235, 235, 229)"]             { border-color: #efefef !important; }

  /* ─── Per-theme .bc-announcement (uses class-defined rgba, not inline) ──── */
  body.theme-stripe   .bc-announcement       { background: rgba(99,91,255,0.04) !important; }
  body.theme-stripe   .bc-announcement:hover { background: rgba(99,91,255,0.07) !important; }
  body.theme-apple    .bc-announcement       { background: rgba(0,113,227,0.04) !important; }
  body.theme-apple    .bc-announcement:hover { background: rgba(0,113,227,0.07) !important; }

  /* ─── Per-theme extra surface polish ──────────────────────────────────────
     Subtle bone surface (#ebebe5) used as bg in places → match each theme. */
  body.theme-stripe [style*="background: rgb(235, 235, 229)"],
  body.theme-stripe [style*="background-color: rgb(235, 235, 229)"]    { background-color: #EFF3F7 !important; }
  body.theme-apple  [style*="background: rgb(235, 235, 229)"],
  body.theme-apple  [style*="background-color: rgb(235, 235, 229)"]    { background-color: #e8e8ed !important; }

  /* ─── Mobile (≤ 760px) ───────────────────────────────────────────────── */
  @media (max-width: 760px) {
    /* Stack every multi-column grid — minmax(0,1fr) lets cols shrink below content min */
    [style*="1fr 400px"],
    [style*="1fr 360px"],
    [style*="1fr 320px"],
    [style*="1fr 280px"],
    [style*="1fr) 280px"],     /* matches "minmax(0,1fr) 280px" */
    [style*="1fr auto"],
    [style*="260px 1fr"],
    [style*="300px 1fr"],
    [style*="360px 1fr"],
    [style*="380px 1fr"],
    [style*="392px 1fr"],
    [style*="200px 320px 1fr"],
    [style*="repeat(2, 1fr)"],
    [style*="repeat(3, 1fr)"] {
      grid-template-columns: minmax(0, 1fr) !important;
    }
    /* Person card: auto 1fr auto — fold the right-side actions under content */
    [style*="grid-template-columns: auto 1fr auto"][style*="gap: 20px"] {
      grid-template-columns: auto minmax(0, 1fr) !important;
      gap: 14px !important;
      padding: 14px 14px !important;
    }
    [style*="grid-template-columns: auto 1fr auto"][style*="gap: 20px"] > :nth-child(3) {
      grid-column: 1 / -1 !important;
    }
    /* Prompt chips & similar long-text buttons wrap to fit */
    .bc-pill-row > *, button[style*="border-radius: 9999px"] {
      max-width: 100% !important;
      white-space: normal !important;
      text-align: left;
    }
    /* Page wrappers fill viewport */
    [style*="max-width: 1280px"],
    [style*="max-width: 1080px"],
    [style*="max-width: 900px"],
    [style*="max-width: 760px"],
    [style*="max-width: 640px"],
    [style*="max-width: 440px"] {
      max-width: 100% !important;
    }
    /* Page-level paddings */
    [style*="padding: 32px"]              { padding: 18px 16px !important; }
    [style*="padding: 40px 32px"]         { padding: 22px 16px !important; }
    [style*="padding: 32px 32px 48px"]    { padding: 18px 16px 32px !important; }
    [style*="padding: 24px 32px 20px"]    { padding: 16px 16px 14px !important; }
    [style*="padding: 14px 32px"]         { padding: 12px 16px !important; }
    [style*="padding: 80px 32px"]         { padding: 40px 16px !important; }
    /* Hero / announcement bar */
    [style*="padding: 8px 32px"]          { padding: 8px 16px !important; }
    /* Big headings shrink */
    [style*="font-size: 36px"] { font-size: 26px !important; line-height: 1.18 !important; }
    [style*="font-size: 32px"] { font-size: 22px !important; line-height: 1.2 !important; }
    [style*="font-size: 28px"] { font-size: 21px !important; line-height: 1.22 !important; }
    [style*="font-size: 22px"] { font-size: 18px !important; }
    /* Drop sticky asides */
    [style*="position: sticky"][style*="top: 24px"] {
      position: static !important;
    }
    /* Gaps */
    [style*="gap: 40px"] { gap: 18px !important; }
    [style*="gap: 32px"] { gap: 18px !important; }
    /* Pinned-width sidebars become full-width blocks */
    [style*="width: 300px"][style*="flex-shrink: 0"],
    [style*="width: 320px"][style*="flex-shrink: 0"],
    [style*="width: 360px"][style*="flex-shrink: 0"],
    [style*="width: 400px"][style*="flex-shrink: 0"] {
      width: 100% !important;
    }
    /* Wide flex rows wrap so children flow */
    [style*="display: flex"][style*="gap: 40px"],
    [style*="display: flex"][style*="gap: 32px"] {
      flex-wrap: wrap !important;
    }
    /* Availability card on Help screen: let it wrap & relax dividers */
    [style*="display: flex"][style*="gap: 20px"][style*="align-items: center"] {
      flex-wrap: wrap !important;
      row-gap: 12px !important;
    }
    /* Make the inline tall dividers in availability card hide on mobile */
    [style*="width: 1px"][style*="height: 36px"] { display: none !important; }
    /* Hero band — reduce vertical padding */
    [style*="padding: 96px 32px"][style*="align-items: center"] {
      padding: 22px 16px !important;
    }
    /* Profile/event details: dl 2-column → block */
    [style*="grid-template-columns: auto 1fr"] {
      grid-template-columns: 1fr !important;
    }
    /* Reduce big bottom paddings */
    [style*="padding-bottom: 60px"] { padding-bottom: 24px !important; }
    /* Member profile hero stack */
    [style*="gap: 24px"][style*="grid-template-columns"] { gap: 16px !important; }
    /* Reserve space for bottom tab bar — ONLY inside main (the scroller).
       Do NOT put padding-bottom on body — that would make the document
       taller than the viewport, creating a document-level scroll. On iOS,
       any document scroll causes the visual viewport (and the fixed bottom
       tab bar within it) to visually rubber-band with the page. We want
       all scrolling to happen INSIDE main so the viewport stays still. */
    main {
      padding-bottom: 60px;
      overscroll-behavior-y: contain;
      position: relative;
    }
    /* iOS rubber-band trap.
       When a screen fits in one viewport (e.g. Inbox > Priority with 4
       items), main has no natural overflow, so touch-drag gestures escape
       to the visual viewport and the whole page rubber-bands.

       Fix: an absolutely-positioned 1px sentinel below main's bottom edge.
       This makes main.scrollHeight > main.clientHeight unconditionally, so
       main IS a real scroll container even on short screens. Combined with
       `overscroll-behavior-y: contain`, all bounce stays inside main and
       never chains to the viewport. Invisible, no layout impact. */
    main::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 0;
      width: 1px;
      height: 1px;
      pointer-events: none;
    }
    /* Show / hide helpers */
    .bc-desktop-only { display: none !important; }
    .bc-mobile-only  { display: flex !important; }
    .bc-mobile-tabbar {
      display: flex !important;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      height: 60px; background: #ffffff; border-top: 1px solid #dcdcd6;
      padding: 6px 4px 8px;
      align-items: stretch; justify-content: space-around;
      box-shadow: 0 -4px 14px -4px rgba(12,12,11,0.06);
    }
    /* Header on mobile — drop big gaps & tighten */
    .bc-header-inner { padding: 0 14px !important; height: 56px !important; gap: 8px !important; }
    .bc-header-wordmark { font-size: 16px !important; }
    /* Announcement banner: hide the timestamp pill on mobile */
    .bc-announcement { font-size: 11px; }
    .bc-announcement-meta { display: none !important; }
    /* Pill rows — already use flex-wrap; nothing to add */
    /* Inbox: only show one panel at a time. Sidebar on top when nothing selected. */
    /* Event card grid (date | content | actions) collapses to flow */
    [style*="grid-template-columns: auto 1fr auto"] {
      grid-template-columns: auto 1fr !important;
    }
    [style*="grid-template-columns: auto 1fr auto"] > :nth-child(3) {
      grid-column: 1 / -1 !important;
      display: flex !important;
      flex-direction: row !important;
      gap: 8px !important;
    }
    [style*="grid-template-columns: auto 1fr auto"] > :nth-child(3) > * { flex: 1 !important; }

    /* Inbox: hide the right-rail (detail pane) by default — list-first navigation. */
    [style*="grid-template-columns: 360px 1fr"][style*="overflow: hidden"] > :nth-child(2) {
      border-top: 1px solid #ebebe5;
    }

    /* People search bar: drop the rigid min-width on mobile so the search
       and the "X results · Y open" caption fit cleanly side-by-side or stack. */
    .bc-people-searchbar {
      min-width: 0 !important;
      width: 100% !important;
      flex: 1 1 auto !important;
    }
    .bc-people-context-strip {
      padding: 12px 16px !important;
      gap: 10px !important;
    }
    /* Avatar / large media stays reasonably sized */
    [style*="width: 88px"][style*="height: 88px"],
    [style*="width: 96px"][style*="height: 96px"] {
      width: 72px !important; height: 72px !important;
    }
    /* Hero "Your asks" card border softens on mobile */
    /* Reduce mid-large heading on mobile */
    [style*="font-size: 22px"][style*="font-weight: 600"] { font-size: 18px !important; }
    /* Top breadcrumb bar: keep label readable */
    /* Profile sticky aside becomes a normal block */
    aside[style*="position: sticky"] { position: static !important; width: 100% !important; }

    /* Tap targets: bump up small icon buttons */
    button[style*="width: 28px"][style*="height: 28px"] {
      width: 32px !important; height: 32px !important;
    }

    /* Notification dropdown: shrink to viewport width (was 340px) */
    [style*="width: 340px"][style*="position: absolute"][style*="top: 44px"] {
      width: calc(100vw - 24px) !important;
      max-width: 360px !important;
      right: 12px !important;
    }
    /* Account dropdown: nudge in from edge */
    [style*="min-width: 180px"][style*="position: absolute"][style*="top: 44px"] {
      right: 8px !important;
    }

    /* Tweaks panel: drop max width so it doesn't clip viewport */
    .twk-panel {
      width: calc(100vw - 24px) !important;
      max-width: 320px !important;
      right: 12px !important;
      bottom: 76px !important;  /* clear bottom tab bar */
      max-height: calc(100vh - 140px) !important;
    }

    /* EventsMasterDetail: kill the inner border between list & detail when stacked */
    .bc-events-master-detail > :first-child {
      border-right: none !important;
      border-bottom: 1px solid #ebebe5 !important;
    }
    /* Event hero band — let actions wrap below title */
    .bc-events-master-detail [style*="grid-template-columns: 1fr auto"][style*="padding: 32px 36px"] {
      grid-template-columns: 1fr !important;
      padding: 22px 18px !important;
      gap: 14px !important;
    }

    /* Hero band right column ("Your asks") — give it breathing room on top */
    [style*="grid-template-columns: 1fr 400px"] > :nth-child(2) {
      margin-top: 4px;
    }

    /* Long titles wrap pretty in hero */
    h1[style*="font-size"] { text-wrap: balance; }

    /* AskBar: the inner 3-col chip grid stacks naturally via repeat(3,1fr) rule */
    /* Toolbars / button rows wrap rather than overflow */
    [style*="display: flex"][style*="gap: 10px"][style*="margin-top: 20px"] {
      flex-wrap: wrap !important;
    }
  }
  /* Hide mobile-only items on desktop */
  @media (min-width: 761px) {
    .bc-mobile-only { display: none !important; }
    .bc-mobile-tabbar { display: none !important; }
  }
</style>
</head>

const MONTH_SHORT_TO_IDX = { JAN:0, FEB:1, MAR:2, APR:3, MAY:4, JUN:5, JUL:6, AUG:7, SEP:8, OCT:9, NOV:10, DEC:11 };
const MONTH_LONG_NAMES   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WEEKDAY_SHORT      = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const TODAY = new Date(2026, 4, 27); // demo: May 27, 2026

function eventDate(ev) { return new Date(2026, MONTH_SHORT_TO_IDX[ev.month], parseInt(ev.day, 10)); }
function eventWeekday(ev) { return WEEKDAY_SHORT[eventDate(ev).getDay()]; }
function eventMonthLong(ev) { return MONTH_LONG_NAMES[MONTH_SHORT_TO_IDX[ev.month]]; }
function eventDaysAway(ev) { return Math.round((eventDate(ev).getTime() - TODAY.getTime()) / 86400000); }

function EventCountdown({ ev }) {
  const d = eventDaysAway(ev);
  let cfg;
  if (d <= 0)       cfg = { color: '#9b2c1f', bg: 'rgba(155,44,31,0.10)', text: d === 0 ? 'Today' : 'Past' };
  else if (d === 1) cfg = { color: '#a16207', bg: 'rgba(161,98,7,0.12)', text: 'Tomorrow' };
  else if (d <= 7)  cfg = { color: '#a16207', bg: 'rgba(161,98,7,0.12)', text: `In ${d}d` };
  else if (d <= 30) cfg = { color: '#2563eb', bg: 'rgba(37,99,235,0.08)',  text: `In ${d}d` };
  else              cfg = { color: '#4d4d4a', bg: '#ebebe5',               text: `In ${d}d` };
  return React.createElement('span', {
    style: {
      display: 'inline-flex', alignItems: 'center', padding: '3px 8px', borderRadius: '4px',
      fontFamily: "'JetBrains Mono', monospace", fontSize: '10px', fontWeight: 700,
      letterSpacing: '0.04em', textTransform: 'uppercase',
      color: cfg.color, background: cfg.bg, border: `1px solid ${cfg.color}33`,
    },
  }, cfg.text);
}

  "colorTheme": "bridgecircle",
  "cardColumns": 3
}/*EDITMODE-END*/;

// ─── Root App ─────────────────────────────────────────────────────────────────
function App() {
  const [t, setTweakState] = React.useState(TWEAK_DEFAULTS);
  const setTweak = React.useCallback((key, val) => {
    const edits = typeof key === 'object' ? key : { [key]: val };
    setTweakState(prev => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);

  // Apply selected color theme to <body> so the theme CSS layer kicks in.
  React.useEffect(() => {
    const all = ['theme-stripe', 'theme-apple', 'theme-instagram'];
    all.forEach(c => document.body.classList.remove(c));
    // Back-compat: "spotify" was removed → fall back to instagram.
    const t2 = t.colorTheme === 'spotify' ? 'instagram' : t.colorTheme;
    if (t2 && t2 !== 'bridgecircle') {
      document.body.classList.add(`theme-${t2}`);
    }
  }, [t.colorTheme]);

  const [screen, setScreen] = React.useState('ask');
  const [peopleQuery, setPeopleQuery] = React.useState('');
  const [askPerson, setAskPerson] = React.useState(null);
  const [activeEvent, setActiveEvent] = React.useState(null);
  const [activeMember, setActiveMember] = React.useState(null);

  const handleNavigate = (dest, payload = null) => {
    if (dest === 'people' && typeof payload === 'string') setPeopleQuery(payload);
    if (dest === 'ask_person' && payload) setAskPerson(payload);
    if (dest === 'event_detail' && payload) setActiveEvent(payload);
    if (dest === 'member_profile' && payload) setActiveMember(payload);
    setScreen(dest);
  };

  // Track mobile so the inbox uses the same scroll model as other tabs on
  // small viewports (main scrolls; both bars stay anchored).
  const [isMobile, setIsMobile] = React.useState(() =>
    typeof window !== 'undefined' && window.matchMedia('(max-width: 760px)').matches
  );
  React.useEffect(() => {
    const mq = window.matchMedia('(max-width: 760px)');
    const onChange = (e) => setIsMobile(e.matches);
    mq.addEventListener ? mq.addEventListener('change', onChange) : mq.addListener(onChange);
    return () => mq.removeEventListener ? mq.removeEventListener('change', onChange) : mq.removeListener(onChange);
  }, []);

  // Inbox locks the viewport with internal scrollers only on DESKTOP, where
  // the classic two-pane (list | thread) layout needs it. On mobile the inbox
  // grows naturally and `main` scrolls — same as Ask, Help, People, etc.
  const inboxFill = screen === 'inbox' && !isMobile;

  return React.createElement('div', {
    style: { display: 'flex', flexDirection: 'column', minHeight: '100vh' },
  },
    React.createElement(BCHeader, {
      activeScreen: screen,
      onNavigate: handleNavigate,
      isAdmin: false,
      unreadCount: 2,
    }),
    React.createElement('main', {
      style: {
        flex: 1,
        display: inboxFill ? 'flex' : 'block',
        flexDirection: inboxFill ? 'column' : undefined,
        overflow: inboxFill ? 'hidden' : 'auto',
      },
    },
      screen === 'ask'    && React.createElement(HomeScreen, { onNavigate: handleNavigate, t, setTweak }),
      screen === 'help'   && React.createElement(HelpScreen, { onNavigate: handleNavigate, t, setTweak }),
      screen === 'people' && React.createElement(PeopleScreen, { initialQuery: peopleQuery, onNavigate: handleNavigate }),
      screen === 'inbox'  && React.createElement(InboxScreen),
      screen === 'school' && React.createElement(SchoolScreen, { onNavigate: handleNavigate }),
      screen === 'event_detail' && React.createElement(EventDetailScreen, { event: activeEvent, onNavigate: handleNavigate }),
      screen === 'member_profile' && React.createElement(MemberProfileScreen, { person: activeMember, onNavigate: handleNavigate }),
      screen === 'admin'  && React.createElement('div', { style: { padding: '40px 32px', color: '#4d4d4a', fontSize: '14px' } }, 'Admin surface — density-pro. See density card in design system.'),
      screen === 'ask_person'       && React.createElement(AskPersonScreen, { person: askPerson, onNavigate: handleNavigate }),
      screen === 'profile'           && React.createElement(ProfileScreen, { onNavigate: handleNavigate }),
      screen === 'account_settings'  && React.createElement(AccountSettingsScreen),
      screen === 'signout'           && React.createElement(SignOutScreen, { onNavigate: handleNavigate })
    )
  );
}
