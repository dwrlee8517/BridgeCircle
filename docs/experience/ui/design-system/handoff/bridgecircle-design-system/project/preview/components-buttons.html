<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#fafaf9;padding:20px;color:#0c0c0b}
  .section-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#2563eb;margin:0 0 10px;display:flex;align-items:center;gap:6px}
  .section-label::before{content:'';display:block;width:20px;height:2px;background:#2563eb;border-radius:99px}
  .row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  /* Base button */
  .btn{display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 16px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:all 150ms ease-out;font-family:'Inter',sans-serif}
  .btn-cta{background:#f59e0b;color:#0c0c0b}
  .btn-primary{background:#2563eb;color:#fff}
  .btn-secondary{background:#f4f3ee;color:#0c0c0b}
  .btn-outline{background:#fff;color:#0c0c0b;border-color:#dcdcd6}
  .btn-ghost{background:transparent;color:#0c0c0b}
  .btn-destructive{background:rgb(155 44 31/.10);color:#9b2c1f;border-color:rgba(155,44,31,.2)}
  .btn-link{background:transparent;color:#2563eb;text-decoration:underline;text-underline-offset:3px}
  /* Sizes */
  .btn-xs{height:28px;padding:0 10px;font-size:11.5px;border-radius:8px}
  .btn-sm{height:32px;padding:0 12px;font-size:12.5px}
  .btn-lg{height:44px;padding:0 20px;font-size:15.2px}
  .btn-icon{width:40px;height:40px;padding:0;display:inline-flex;align-items:center;justify-content:center}
  /* States */
  .btn-disabled{opacity:.6;cursor:not-allowed}
  .btn-loading{opacity:.8;cursor:not-allowed}
  .focus-demo{outline:2px solid #2563eb;outline-offset:2px;box-shadow:0 0 0 4px rgb(37 99 235/.10)}
  .caption{font-size:9.5px;color:#4d4d4a;margin-top:4px;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div class="section-label">Variants</div>
<div class="row">
  <div><button class="btn btn-cta">Ask for advice</button><div class="caption">cta — amber</div></div>
  <div><button class="btn btn-primary">Find people</button><div class="caption">default — primary</div></div>
  <div><button class="btn btn-secondary">Update availability</button><div class="caption">secondary</div></div>
  <div><button class="btn btn-outline">View profile</button><div class="caption">outline</div></div>
  <div><button class="btn btn-ghost">Cancel</button><div class="caption">ghost</div></div>
  <div><button class="btn btn-destructive">Revoke invite</button><div class="caption">destructive</div></div>
  <div><button class="btn btn-link">See all →</button><div class="caption">link</div></div>
</div>

<div class="section-label">Sizes</div>
<div class="row" style="align-items:flex-end">
  <div><button class="btn btn-primary btn-xs">Send</button><div class="caption">xs · 28px</div></div>
  <div><button class="btn btn-primary btn-sm">Ask</button><div class="caption">sm · 32px</div></div>
  <div><button class="btn btn-primary">Request mentorship</button><div class="caption">default · 40px</div></div>
  <div><button class="btn btn-primary btn-lg">Find people →</button><div class="caption">lg · 44px</div></div>
  <div>
    <button class="btn btn-primary btn-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <div class="caption">icon · 40px</div>
  </div>
</div>

<div class="section-label">States</div>
<div class="row">
  <div><button class="btn btn-primary">Normal</button><div class="caption">default</div></div>
  <div><button class="btn btn-primary" style="background:#1d4ed8">Hover</button><div class="caption">hover</div></div>
  <div><button class="btn btn-primary" style="opacity:.8">Active</button><div class="caption">active (80%)</div></div>
  <div><button class="btn btn-primary focus-demo">Focus</button><div class="caption">focus-visible</div></div>
  <div><button class="btn btn-primary btn-disabled" disabled>Disabled</button><div class="caption">disabled (60%)</div></div>
  <div><button class="btn btn-primary btn-loading">Sending…</button><div class="caption">loading (80%)</div></div>
</div>

<div class="section-label">CTA rule — one per decision area</div>
<div style="background:#fff;border:1px solid #dcdcd6;border-radius:10px;padding:14px 16px;display:flex;gap:8px;align-items:center">
  <button class="btn btn-cta btn-sm">RSVP to event</button>
  <button class="btn btn-outline btn-sm">View details</button>
  <button class="btn btn-ghost btn-sm">Share</button>
  <span style="font-size:10px;color:#4d4d4a;margin-left:8px">← one amber CTA; rest are outline/ghost</span>
</div>
</body>
</html>
