<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School layout · Variations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Inter:wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; color: #0c0c0b; background: #ebebe5; }
  button { font-family: inherit; cursor: pointer; }
  .kicker { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase; color: #2563eb; }
  .kicker::before { content: ''; display: block; width: 28px; height: 2px; background: currentColor; border-radius: 999px; }
  .display { font-family: 'Inter Tight', sans-serif; letter-spacing: -0.02em; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px;
         font-family: 'Inter', sans-serif; font-weight: 600; cursor: pointer;
         transition: background 150ms, border-color 150ms; border-radius: 8px; white-space: nowrap; }
  .btn-cta { background: #f59e0b; color: #0c0c0b; border: 1px solid #f59e0b; }
  .btn-outline { background: #fff; color: #0c0c0b; border: 1px solid #dcdcd6; }
  .btn-ghost { background: transparent; color: #4d4d4a; border: 1px solid transparent; }
  .btn-sm { height: 30px; padding: 0 12px; font-size: 11.5px; }
  .btn-md { height: 38px; padding: 0 16px; font-size: 13px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="school-layout-variants.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas
      title="School layout · Crowding fix"
      subtitle="The right-rail layout shrinks the master-detail's detail panel. Three approaches to solve it."
    >
      <DCSection id="school-layout" title="Layout options">
        <DCArtboard id="current" label="Current · 320px full-body rail" width={1280} height={1180}>
          <SchoolCurrent />
        </DCArtboard>
        <DCArtboard id="opt1" label="Option 1 · Compact rail + narrower list" width={1280} height={1180}>
          <SchoolOption1 />
        </DCArtboard>
        <DCArtboard id="opt2" label="Option 2 · Reflow calendar (stack list + detail)" width={1280} height={1260}>
          <SchoolOption2 />
        </DCArtboard>
        <DCArtboard id="opt3" label="Option 3 · Full-width calendar, 3-up announcements below" width={1280} height={1380}>
          <SchoolOption3 />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
