<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BridgeCircle — Ask, redesigned</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600;1,700&family=Inter:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #fafaf9; color: #0c0c0b;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body.midnight { background: #050a18; color: #fafaf9; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #dcdcd6; border-radius: 3px; }
  body.midnight ::-webkit-scrollbar-thumb { background: rgba(250,250,249,0.2); }

  input, textarea, select, button { font-family: inherit; }
  button { background: none; border: none; cursor: pointer; }

  /* ───────── EDITORIAL TYPE PRIMITIVES ───────── */
  .nr-kicker {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.10em;
    text-transform: uppercase; color: var(--kicker-color, #2563eb);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .nr-kicker .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 999px;
    background: currentColor;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(0.85); }
    50%      { opacity: 1;   transform: scale(1); }
  }

  .nr-display {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 600;
    letter-spacing: -0.035em;
    line-height: 0.96;
  }
  .nr-display em {
    font-style: italic;
    font-weight: 500;
    color: var(--accent-color, #2563eb);
  }

  /* Editorial rule */
  .nr-rule {
    height: 1px; background: var(--rule-color, #dcdcd6); width: 100%;
  }

  /* ───────── ASK INPUT ───────── */
  .nr-ask {
    display: flex; align-items: stretch; gap: 0;
    background: var(--input-bg, #fff);
    border: 1.5px solid var(--input-border, #0c0c0b);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 200ms ease, box-shadow 200ms ease;
  }
  .nr-ask:focus-within {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
  }
  body.midnight .nr-ask { background: rgba(255,255,255,0.04); border-color: rgba(250,250,249,0.28); }
  body.midnight .nr-ask:focus-within { border-color: #93c5fd; box-shadow: 0 0 0 4px rgba(147,197,253,0.18); }
  .nr-ask input {
    flex: 1; min-width: 0;
    border: none; outline: none; background: transparent;
    padding: 0 24px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 22px; font-weight: 500;
    color: inherit;
  }
  .nr-ask input::placeholder {
    color: var(--input-placeholder, rgba(12,12,11,0.42));
    font-weight: 400;
  }
  body.midnight .nr-ask input::placeholder { color: rgba(250,250,249,0.45); }
  .nr-ask-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0 28px;
    background: #f59e0b; color: #0c0c0b;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px;
    border-radius: 0;
    transition: background 150ms ease;
  }
  .nr-ask-cta:hover { background: #d97706; }
  .nr-ask-stamp {
    display: inline-flex; align-items: center;
    padding: 0 18px 0 24px; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--input-stamp, #4d4d4a); letter-spacing: 0.06em;
    border-left: 1px dashed var(--rule-color, #dcdcd6);
  }
  body.midnight .nr-ask-stamp { color: rgba(250,250,249,0.55); }

  /* ───────── TOPIC INDEX ENTRY ───────── */
  .nr-topic {
    display: grid;
    grid-template-columns: 50px 1fr auto;
    align-items: baseline;
    gap: 20px;
    padding: 22px 4px 22px 4px;
    border-top: 1px solid var(--rule-color, #dcdcd6);
    cursor: pointer;
    transition: padding 200ms ease, background 200ms ease;
    position: relative;
  }
  .nr-topic:hover {
    padding-left: 16px;
    padding-right: 16px;
  }
  .nr-topic:hover .nr-topic-arrow { opacity: 1; transform: translateX(0); }
  .nr-topic:last-child { border-bottom: 1px solid var(--rule-color, #dcdcd6); }
  .nr-topic-num {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--muted-color, #4d4d4a);
    letter-spacing: 0.04em;
  }
  .nr-topic-title {
    font-family: 'Inter Tight', sans-serif;
    font-size: 28px; font-weight: 500;
    line-height: 1.1;
    letter-spacing: -0.018em;
    color: inherit;
  }
  .nr-topic-example {
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-style: italic;
    color: var(--muted-color, #4d4d4a);
    margin-top: 6px;
    max-width: 56ch;
  }
  .nr-topic-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted-color, #4d4d4a);
    letter-spacing: 0.04em;
    white-space: nowrap;
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  }
  .nr-topic-meta strong {
    font-family: 'Inter Tight', sans-serif;
    font-size: 17px; font-weight: 500;
    color: inherit;
    letter-spacing: -0.01em;
  }
  .nr-topic-arrow {
    position: absolute; right: -28px; top: 50%; transform: translate(-12px, -50%);
    opacity: 0; transition: all 200ms ease;
    color: #2563eb;
  }
  body.midnight .nr-topic-arrow { color: #93c5fd; }

  /* ───────── SPOTLIGHT HELPER CARD ───────── */
  .nr-spotlight {
    display: flex; flex-direction: column;
    background: var(--card-bg, #fff);
    border: 1px solid var(--rule-color, #dcdcd6);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 250ms ease, box-shadow 250ms ease;
  }
  body.midnight .nr-spotlight {
    background: rgba(255,255,255,0.03);
    border-color: rgba(250,250,249,0.12);
  }
  .nr-spotlight:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 40px -16px rgba(12,12,11,0.18);
  }
  body.midnight .nr-spotlight:hover {
    box-shadow: 0 16px 40px -16px rgba(0,0,0,0.65);
  }
  .nr-portrait {
    height: 180px;
    position: relative;
    background: var(--portrait-bg, #ebebe5);
    overflow: hidden;
  }
  body.midnight .nr-portrait { background: rgba(250,250,249,0.06); }
  .nr-portrait::after {
    content: ''; position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(135deg,
        transparent 0,
        transparent 7px,
        rgba(12,12,11,0.04) 7px,
        rgba(12,12,11,0.04) 8px);
  }
  body.midnight .nr-portrait::after {
    background-image:
      repeating-linear-gradient(135deg,
        transparent 0,
        transparent 7px,
        rgba(250,250,249,0.06) 7px,
        rgba(250,250,249,0.06) 8px);
  }
  .nr-monogram {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter Tight', sans-serif;
    font-size: 88px; font-weight: 600;
    letter-spacing: -0.04em;
    color: var(--monogram-color, rgba(12,12,11,0.78));
    z-index: 1;
  }
  body.midnight .nr-monogram { color: rgba(250,250,249,0.82); }
  .nr-portrait-badge {
    position: absolute; top: 14px; right: 14px;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px; border-radius: 999px;
    background: rgba(255,255,255,0.94);
    border: 1px solid rgba(12,12,11,0.08);
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 600; color: #0c0c0b;
    z-index: 2;
  }
  .nr-portrait-badge .dot {
    width: 6px; height: 6px; border-radius: 999px; background: #3b6e51;
  }
  .nr-portrait-stamp {
    position: absolute; top: 14px; left: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
    color: var(--stamp-color, rgba(12,12,11,0.55));
    z-index: 2;
  }
  body.midnight .nr-portrait-stamp { color: rgba(250,250,249,0.7); }
  .nr-spotlight-body { padding: 22px 22px 18px; }
  .nr-spotlight-name {
    font-family: 'Inter Tight', sans-serif;
    font-size: 22px; font-weight: 600;
    letter-spacing: -0.015em;
    line-height: 1.15;
  }
  .nr-spotlight-role {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--muted-color, #4d4d4a);
    margin-top: 4px;
  }
  .nr-spotlight-quote {
    margin-top: 16px;
    border-left: 3px solid #2563eb;
    padding-left: 12px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 16px; font-style: italic; font-weight: 400;
    line-height: 1.45;
    color: inherit;
  }
  body.midnight .nr-spotlight-quote { border-left-color: #93c5fd; }
  .nr-spotlight-actions {
    display: flex; gap: 8px; align-items: center;
    padding: 14px 22px 20px;
    border-top: 1px dashed var(--rule-color, #dcdcd6);
    margin-top: 4px;
  }
  body.midnight .nr-spotlight-actions { border-top-color: rgba(250,250,249,0.12); }
  .nr-btn-primary {
    flex: 1;
    height: 40px;
    padding: 0 16px;
    background: #2563eb; color: #fff;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 150ms ease;
  }
  .nr-btn-primary:hover { background: #1d4ed8; }
  body.midnight .nr-btn-primary { background: #93c5fd; color: #050a18; }
  body.midnight .nr-btn-primary:hover { background: #bfdbfe; }
  .nr-btn-ghost {
    height: 40px;
    padding: 0 14px;
    background: transparent;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    color: var(--muted-color, #4d4d4a);
    transition: color 150ms ease;
  }
  .nr-btn-ghost:hover { color: inherit; }

  /* ───────── MIDNIGHT PULSE BLOCK ───────── */
  .nr-pulse {
    background: #050a18;
    color: #fafaf9;
    border-radius: 14px;
    padding: 28px 26px 24px;
    overflow: hidden;
    position: relative;
  }
  .nr-pulse-net {
    position: absolute; inset: 0; opacity: 0.4; pointer-events: none;
  }
  .nr-pulse-content { position: relative; z-index: 1; }
  .nr-pulse-kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.10em;
    text-transform: uppercase; color: #93c5fd;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .nr-pulse h3 {
    font-family: 'Inter Tight', sans-serif;
    font-size: 26px; font-weight: 500;
    letter-spacing: -0.02em; line-height: 1.18;
    margin-top: 12px;
    max-width: 22ch;
  }
  .nr-pulse h3 em { font-style: italic; color: #93c5fd; font-weight: 500; }
  .nr-pulse-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-top: 26px; padding-top: 20px;
    border-top: 1px solid rgba(250,250,249,0.16);
  }
  .nr-pulse-stat-num {
    font-family: 'Inter Tight', sans-serif;
    font-size: 36px; font-weight: 500;
    letter-spacing: -0.025em; line-height: 1;
  }
  .nr-pulse-stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(250,250,249,0.6);
    margin-top: 8px;
  }
  .nr-pulse-ticker {
    margin-top: 22px; padding: 14px 16px;
    border-radius: 10px;
    background: rgba(250,250,249,0.05);
    border: 1px solid rgba(250,250,249,0.10);
    display: flex; align-items: center; gap: 10px;
    font-size: 13px;
    color: rgba(250,250,249,0.88);
  }
  .nr-pulse-ticker .live-dot {
    width: 8px; height: 8px; border-radius: 999px;
    background: #f59e0b; flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }

  /* ───────── YOUR ASKS LIST ───────── */
  .nr-ask-row {
    display: grid;
    grid-template-columns: 14px 1fr auto;
    align-items: baseline;
    gap: 18px;
    padding: 18px 0;
    border-top: 1px solid var(--rule-color, #dcdcd6);
  }
  .nr-ask-row:last-child { border-bottom: 1px solid var(--rule-color, #dcdcd6); }
  .nr-ask-marker {
    width: 8px; height: 8px; border-radius: 999px;
    background: var(--marker-color, #4d4d4a);
    transform: translateY(8px);
  }
  .nr-ask-summary {
    font-family: 'Inter Tight', sans-serif;
    font-size: 18px; font-weight: 500;
    line-height: 1.35;
    letter-spacing: -0.012em;
    color: inherit;
  }
  .nr-ask-meta {
    margin-top: 6px;
    display: flex; gap: 12px; align-items: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--muted-color, #4d4d4a);
    letter-spacing: 0.04em;
  }
  .nr-ask-status {
    font-weight: 600; text-transform: uppercase;
  }
  .nr-ask-status.replied  { color: #3b6e51; }
  .nr-ask-status.pending  { color: #a16207; }
  .nr-ask-status.draft    { color: var(--muted-color, #4d4d4a); }
  .nr-ask-action {
    font-family: 'Inter', sans-serif; font-size: 13px;
    color: #2563eb; font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
  }
  body.midnight .nr-ask-action { color: #93c5fd; }

  /* ───────── HEADER (LIGHTWEIGHT) ───────── */
  .nr-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 48px;
    border-bottom: 1px solid var(--rule-color, #dcdcd6);
    background: var(--header-bg, rgba(250,250,249,0.85));
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 50;
  }
  body.midnight .nr-header { background: rgba(5,10,24,0.85); }
  .nr-header-logo {
    display: flex; align-items: center; gap: 12px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 17px; font-weight: 600;
    letter-spacing: -0.012em;
  }
  .nr-header-logo svg circle { transition: stroke 200ms ease; }
  .nr-header-nav {
    display: flex; gap: 4px;
  }
  .nr-header-nav a {
    padding: 8px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px; font-weight: 500;
    color: var(--muted-color, #4d4d4a);
    border-radius: 8px;
    text-decoration: none;
    transition: color 150ms ease, background 150ms ease;
    position: relative;
  }
  .nr-header-nav a:hover { color: inherit; }
  .nr-header-nav a.active { color: inherit; font-weight: 600; }
  .nr-header-nav a.active::after {
    content: ''; position: absolute;
    bottom: -19px; left: 14px; right: 14px;
    height: 2px; background: #2563eb;
  }
  body.midnight .nr-header-nav a.active::after { background: #93c5fd; }
  .nr-header-actions {
    display: flex; align-items: center; gap: 12px;
  }
  .nr-header-avatar {
    width: 32px; height: 32px; border-radius: 8px;
    background: #2563eb; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter Tight', sans-serif;
    font-size: 13px; font-weight: 600;
  }

  /* ───────── EDITION STRIP ───────── */
  .nr-edition {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 48px;
    border-bottom: 1px solid var(--rule-color, #dcdcd6);
    background: var(--edition-bg, transparent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.08em;
    color: var(--muted-color, #4d4d4a);
    text-transform: uppercase;
  }

  /* ───────── LAYOUT GRID ───────── */
  .nr-container {
    max-width: 1320px;
    margin: 0 auto;
    padding: 48px;
  }

  /* ───────── FOCUS LAYOUT (variant) ───────── */
  body.focus .nr-hero-grid { grid-template-columns: 1fr; max-width: 880px; margin: 0 auto; padding-top: 80px; padding-bottom: 80px; }
  body.focus .nr-hero-pulse { display: none; }
  body.focus .nr-display { font-size: clamp(54px, 7vw, 96px) !important; text-align: left; }
  body.focus .nr-topic-index { display: none; }
  body.focus .nr-spotlight-section { padding-top: 24px; }
  body.focus .nr-pulse-floating { display: flex; }

  /* ───────── RESPONSIVE ───────── */
  @media (max-width: 1100px) {
    .nr-hero-grid { grid-template-columns: 1fr !important; }
    .nr-spotlights { grid-template-columns: 1fr !important; }
    .nr-footer-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 700px) {
    .nr-container { padding: 24px 18px; }
    .nr-header { padding: 14px 18px; }
    .nr-header-nav { display: none; }
    .nr-edition { padding: 8px 18px; }
    .nr-display { font-size: clamp(38px, 11vw, 64px) !important; }
    .nr-topic-title { font-size: 22px !important; }
    .nr-ask input { font-size: 16px !important; padding: 0 16px !important; }
    .nr-ask-stamp { display: none !important; }
    .nr-ask-cta { padding: 0 18px !important; font-size: 13px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

// ─────────────────────── DATA ───────────────────────
const TOPICS = [
  { num: '01', title: 'A career pivot',        example: 'Move from consulting into product, with someone who actually did it.',  helpers: 14, recent: '3 asked this week' },
  { num: '02', title: 'College applications',  example: 'US college apps, from alumni who got in and remember what mattered.', helpers: 9,  recent: '2 asked this week' },

];

const HELPERS = [
  {
    initials: 'JK', name: 'Jamie Kim',

  {

  {

const MY_ASKS = [
  { summary: 'Looking for advice on moving from consulting into product management.', status: 'replied', count: '2 replies', when: '1d ago', color: '#3b6e51' },
  { summary: 'Need a portfolio review before Big Tech APM applications.',             status: 'pending', count: '0 replies', when: '3d ago', color: '#a16207' },

const TICKER = [
  'Maya is asking about moving to Seoul.',
  'Cam shared a portfolio review template.',
  'Reese is offering 3 mock interviews this week.',
  'Jordan answered a VC question 2 minutes ago.',
];

// ─────────────────────── ICONS ───────────────────────
const Icon = {
  arrow: (size = 14) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
    </svg>

// ─────────────────────── MIDNIGHT PULSE BLOCK ───────────────────────
function PulseBlock() {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick((t) => (t + 1) % TICKER.length), 4000);
    return () => clearInterval(id);
  }, []);
  return (
    <div className="nr-pulse">
      <svg className="nr-pulse-net" viewBox="0 0 380 320" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%"  stopColor="#93c5fd" stopOpacity="0.7"/>
            <stop offset="55%" stopColor="#70a982" stopOpacity="0.55"/>
            <stop offset="100%" stopColor="#dda150" stopOpacity="0.55"/>
          </linearGradient>
        </defs>
        <path d="M40 240 C 120 90 200 80 270 170 S 330 280 360 100" stroke="url(#grad)" strokeWidth="1.2" fill="none"/>
        <path d="M20 80 C 100 150 180 240 270 200 S 340 100 370 230" stroke="rgba(250,250,249,0.14)" strokeWidth="1" fill="none"/>
        {[[40,240],[130,150],[200,200],[270,170],[340,110]].map(([cx,cy],i) => (
          <g key={i}>
            <circle cx={cx} cy={cy} r="5" fill="rgba(250,250,249,0.92)"/>
            <circle cx={cx} cy={cy} r="14" fill="none" stroke="rgba(250,250,249,0.16)"/>
          </g>
        ))}
      </svg>
      <div className="nr-pulse-content">
        <span className="nr-pulse-kicker"><span style={{ width: 6, height: 6, borderRadius: 999, background: '#f59e0b', display: 'inline-block' }}/> Today in your circle</span>
        <h3>A live map of who's <em>around</em>, and what they're being asked.</h3>

        <div className="nr-pulse-stats">
          <div>
            <div className="nr-pulse-stat-num">24</div>
            <div className="nr-pulse-stat-label">Helpers online</div>
          </div>
          <div>
            <div className="nr-pulse-stat-num">7</div>
            <div className="nr-pulse-stat-label">Asks today</div>
          </div>
          <div>
            <div className="nr-pulse-stat-num">28h</div>
            <div className="nr-pulse-stat-label">Avg reply</div>
          </div>
        </div>

        <div className="nr-pulse-ticker" key={tick}>
          <span className="live-dot"/>
          <span style={{ opacity: 0.92 }}>{TICKER[tick]}</span>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────── TWEAKS PANEL ───────────────────────
function TweaksPanel({ tweaks, setTweak }) {
  const [open, setOpen] = useState(true);
  const [hostMode, setHostMode] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setHostMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setHostMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  if (!open && hostMode) return null;
  if (!hostMode && !open) return null;

  return (
    <div style={{
      position: 'fixed', bottom: 18, right: 18, zIndex: 100,
      width: 280,
      background: '#fff',
      border: '1px solid #dcdcd6',
      borderRadius: 12,
      boxShadow: '0 12px 34px -8px rgba(12,12,11,0.18)',
      fontFamily: "'Inter', sans-serif",
      color: '#0c0c0b',
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '12px 14px',
        borderBottom: '1px solid #ebebe5',
      }}>
        <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#2563eb' }}>Tweaks</span>
        <button onClick={() => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }}
                style={{ color: '#4d4d4a', padding: 4, lineHeight: 1 }}>✕</button>
      </div>
      <div style={{ padding: 14, display: 'flex', flexDirection: 'column', gap: 14 }}>
        <TweakRow label="Layout">
          <Segmented value={tweaks.layout} onChange={(v) => setTweak('layout', v)}
                     options={[{ value: 'newsroom', label: 'Newsroom' }, { value: 'focus', label: 'Focus' }]}/>
        </TweakRow>
        <TweakRow label="Mode">
          <Segmented value={tweaks.midnight ? 'dark' : 'light'} onChange={(v) => setTweak('midnight', v === 'dark')}
                     options={[{ value: 'light', label: 'Light' }, { value: 'dark', label: 'Midnight' }]}/>
        </TweakRow>
        <TweakRow label="Italic accent word">
          <Toggle value={tweaks.italicAccent} onChange={(v) => setTweak('italicAccent', v)}/>
        </TweakRow>
      </div>
    </div>
  );
}

function TweakRow({ label, children }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      <span style={{ fontSize: 11, fontWeight: 600, color: '#4d4d4a', letterSpacing: '0.04em', textTransform: 'uppercase' }}>{label}</span>
      {children}
    </div>
  );
}

function Segmented({ value, onChange, options }) {
  return (
    <div style={{ display: 'flex', background: '#f4f3ee', borderRadius: 8, padding: 3 }}>
      {options.map(o => (
        <button key={o.value} onClick={() => onChange(o.value)}
                style={{
                  flex: 1,
                  padding: '6px 10px',
                  fontSize: 12, fontWeight: 600,
                  borderRadius: 6,
                  background: value === o.value ? '#fff' : 'transparent',
                  color: value === o.value ? '#0c0c0b' : '#4d4d4a',
                  boxShadow: value === o.value ? '0 1px 2px rgba(12,12,11,0.08)' : 'none',
                  transition: 'all 150ms ease',
                }}>{o.label}</button>
      ))}
    </div>
  );
}

function Toggle({ value, onChange }) {
  return (
    <button onClick={() => onChange(!value)}
            style={{
              width: 38, height: 22, borderRadius: 999,
              background: value ? '#2563eb' : '#dcdcd6',
              position: 'relative',
              transition: 'background 150ms ease',
            }}>
      <span style={{
        position: 'absolute', top: 3, left: value ? 19 : 3,
        width: 16, height: 16, borderRadius: 999, background: '#fff',
        transition: 'left 150ms ease',
      }}/>
    </button>
  );
}

// ─────────────────────── APP ───────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "layout": "newsroom",
  "midnight": true,
  "italicAccent": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const setTweak = (key, val) => {
    const edits = typeof key === 'object' ? key : { [key]: val };
    setTweaks(prev => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  };
  const [query, setQuery] = useState('');

  useEffect(() => {
    document.body.classList.toggle('midnight', tweaks.midnight);
    document.body.classList.toggle('focus', tweaks.layout === 'focus');
  }, [tweaks.midnight, tweaks.layout]);

  return (
    <>
      <Header midnight={tweaks.midnight}/>
      <main className="nr-container">
        <Hero query={query} setQuery={setQuery} midnight={tweaks.midnight} italicAccent={tweaks.italicAccent}/>
        <TopicIndex midnight={tweaks.midnight} onPick={(text) => setQuery(text)}/>
        <Spotlights midnight={tweaks.midnight}/>
        <YourAsks midnight={tweaks.midnight}/>
      </main>
      <FocusFloatingPulse midnight={tweaks.midnight} visible={tweaks.layout === 'focus'}/>
      <TweaksPanel tweaks={tweaks} setTweak={setTweak}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
