    /* Premium custom styling for paper & print effect */
    body {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Print Journal double border line */
    .double-rule {
      border-bottom: 3px double currentColor;
    }
    
    .double-rule-top {
      border-top: 3px double currentColor;
    }

    /* Dropcap styling */
    .dropcap::first-letter {
      font-family: 'Fraunces', serif;
      font-size: 3.2em;
      font-weight: 700;
      float: left;
      line-height: 0.8;
      margin-right: 0.15em;
      margin-top: 0.05em;
      color: var(--accent-color, #173fb3);
    }

    /* Custom scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(12, 12, 11, 0.15);
      border-radius: 999px;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: rgba(250, 250, 249, 0.15);
    }

    /* Ticket ticket stub notches */
    .ticket-stub {
      position: relative;
      background-image: radial-gradient(circle at 0% 50%, transparent 8px, currentColor 8px);
    }

    /* Micro animations */
    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-slideup {
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes pulse-slow {
      0%, 100% { opacity: 0.25; transform: scale(0.97); }
      50% { opacity: 0.45; transform: scale(1.03); }
    }
    .pulse-glow {
      animation: pulse-slow 4s infinite ease-in-out;
    }
  </style>

            if (e.viewerRsvp === 'going' && state !== 'going') offset = -1;

              ...e,
              viewerRsvp: state,
              goingCount: Math.min(e.capacity || 100, Math.max(0, e.goingCount + offset))

                                <tr
                                  onClick={() => setSelectedId(isSelected ? null : e.id)}
                                  class={`hover:bg-[#fafaf9] dark:hover:bg-zinc-850 cursor-pointer transition-colors ${isSelected ? 'bg-zinc-50 dark:bg-zinc-800/60' : ''}`}
                                >
                                  {/* T-minus days count */}
                                  <td class="py-4 px-6 font-bold" style={{ color: accent.hex }}>
                                    T-{e.days}D
                                  </td>
                                  
                                  {/* Title and Category */}
                                  <td class="py-4 px-6 font-sans">
                                    <div class="text-[13px] font-semibold text-zinc-900 dark:text-white group-hover:underline">
                                      {e.title}
                                    </div>
                                    <div class="text-[10px] text-gray-400 dark:text-zinc-500 mt-0.5 font-mono">
                                      {e.category}
                                    </div>
                                  </td>

                                  {/* Calendar Schedule */}
                                  <td class="py-4 px-6 whitespace-nowrap text-zinc-700 dark:text-zinc-300">
                                    {dateObj.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' })}
                                  </td>

                                  {/* Geographical coordinate */}
                                  <td class="py-4 px-6 text-gray-500 dark:text-zinc-400 max-w-xs truncate">
                                    {e.location}
                                  </td>

                                  {/* Volume metric */}
                                  <td class="py-4 px-6 text-zinc-900 dark:text-white">
                                    {e.goingCount} / {e.capacity ? e.capacity : 'Open'} going
                                  </td>

                                  {/* Quick RSVP toggle click */}
                                  <td class="py-4 px-6 text-right" onClick={(ev) => ev.stopPropagation()}>
                                    <button
                                      onClick={() => handleRsvpChange(e.id, isGoing ? 'not-yet' : 'going')}
                                      class="text-[10px] font-bold uppercase tracking-[0.1em] border px-2.5 py-1 rounded cursor-pointer transition-all"
                                      style={{
                                        borderColor: isGoing ? '#22c55e' : accent.hex,
                                        color: isGoing ? '#22c55e' : accent.hex,
                                        backgroundColor: isGoing ? 'rgba(34, 197, 94, 0.08)' : 'transparent'
                                      }}
                                    >
                                      {isGoing ? 'Going ✓' : 'Attend'}
                                    </button>
                                  </td>
                                </tr>

                                {/* Inset details view panel */}
                                {isSelected && (
                                  <tr>
                                    <td colSpan="6" class="bg-zinc-50/50 dark:bg-zinc-800/10 px-8 py-6 border-b border-zinc-200 dark:border-zinc-800 font-sans">
                                      <div class="grid grid-cols-1 lg:grid-cols-[2fr_1fr] gap-6">
                                        
                                        {/* Synopsis & full details */}
                                        <div class="space-y-4">
                                          <div>
                                            <h5 class="font-mono text-[9px] font-bold uppercase tracking-[0.12em] text-gray-400">Brief Overview</h5>
                                            <p class="text-sm text-gray-600 dark:text-zinc-300 mt-1 leading-relaxed whitespace-pre-line">
                                              {e.description}
                                            </p>
                                          </div>
                                          
                                          {/* Inset agendas */}
                                          <div>
                                            <h5 class="font-mono text-[9px] font-bold uppercase tracking-[0.12em] text-gray-400">Scheduled Docket</h5>
                                            <div class="mt-2 space-y-2">
                                              {e.agenda.slice(0, 3).map((item, keyIdx) => (
                                                <div key={keyIdx} class="flex items-baseline gap-3 text-xs">
                                                  <span class="font-mono text-[10px] font-semibold text-gray-400 w-14 shrink-0">{item.time}</span>
                                                  <span class="text-zinc-700 dark:text-zinc-300 font-medium">{item.title}</span>
                                                </div>
                                              ))}
                                            </div>
                                          </div>
                                        </div>

                                        {/* Moderator and Roster details */}
                                        <div class="space-y-4 border-l border-zinc-200 dark:border-zinc-800 pl-6">
                                          <div>
                                            <h5 class="font-mono text-[9px] font-bold uppercase tracking-[0.12em] text-gray-400">Moderator Convener</h5>
                                            <p class="text-xs font-semibold text-zinc-900 dark:text-white mt-1">{e.host}</p>
                                          </div>
                                          
                                          <div>
                                            <h5 class="font-mono text-[9px] font-bold uppercase tracking-[0.12em] text-gray-400">Vouched Cohort Attendees</h5>
                                            <div class="flex flex-wrap gap-1.5 mt-2">
                                              {e.attendees.map((attendee, attIdx) => (
                                                <span 
                                                  key={attIdx} 
                                                  class="text-[10px] font-mono font-semibold px-2.5 py-0.5 rounded-[4px]"
                                                  style={{ backgroundColor: attendee.bg, color: attendee.fg }}
                                                >
                                                  {attendee.name} '{attendee.year.slice(-2)}
                                                </span>
                                              ))}
                                            </div>
                                          </div>
                                        </div>

                                      </div>
                                    </td>
                                  </tr>
                                )}
                              </React.Fragment>
                            );
                          })
                        ) : (
                          <tr>
                            <td colSpan="6" class="py-8 text-center text-gray-400 dark:text-zinc-500">
                              No active gathering indexes match active filters.
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* CONCEPT D: THE POSTER GAZETTE */}
            {concept === 'poster' && (
              <div class="grid grid-cols-1 lg:grid-cols-[1.5fr_1fr] gap-8 items-start">
                
                {/* Poster display */}
                <div class="border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 rounded-[6px] p-6 sm:p-8 space-y-8 shadow-sm relative overflow-hidden">
                  
                  {/* Huge background outline watermark watermark */}
                  <div class="absolute -right-10 -top-10 font-serif text-[180px] font-bold select-none pointer-events-none opacity-5 text-zinc-900 dark:text-white leading-none">
                    PV-25
                  </div>

                  {/* Header Title Block */}
                  <div class="space-y-4 border-b border-zinc-200 dark:border-zinc-800 pb-6 relative z-10">
                    <span class="font-mono text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 dark:text-zinc-500">
                      GATHERING DIRECTIVE // {selectedEvent.category.toUpperCase()}
                    </span>
                    <h3 class="font-serif text-3xl sm:text-5xl font-extrabold tracking-tight text-zinc-900 dark:text-white leading-[1.05]">
                      {selectedEvent.title}
                    </h3>
                    <p class="text-sm font-serif italic text-gray-500 dark:text-zinc-400 max-w-2xl">
                      "{selectedEvent.tagline}"
                    </p>
                  </div>

                  {/* Poster content columns */}
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 leading-relaxed text-sm text-zinc-700 dark:text-zinc-300">
                    <div class="space-y-4">
                      <h4 class="font-mono text-[9px] font-bold uppercase tracking-[0.14em] text-gray-400 dark:text-zinc-500">Brief Narrative</h4>
                      <p class="font-serif text-[15px] italic text-zinc-850 dark:text-zinc-250 leading-relaxed">
                        Join your peer community of Chadwick graduates for structured advisory discussions and local mentorship matching.
                      </p>
                      <p class="text-[13px]">
                        Our pilot program centers on active exchange. In addition to peer roundtables, members can book direct office hours blocks with our lead host during scheduling slots.
                      </p>
                    </div>

                    <div class="space-y-4 bg-zinc-50 dark:bg-zinc-950/40 p-4 rounded-[6px] border border-zinc-200 dark:border-zinc-850">
                      <h4 class="font-mono text-[9px] font-bold uppercase tracking-[0.14em] text-gray-400 dark:text-zinc-500">Admission Specs</h4>
                      
                      <div class="space-y-2 text-xs">
                        <div class="flex justify-between border-b border-zinc-200 dark:border-zinc-800 pb-1.5">
                          <span class="text-gray-400">Convened by:</span>
                          <span class="font-bold">{selectedEvent.host}</span>
                        </div>
                        <div class="flex justify-between border-b border-zinc-200 dark:border-zinc-800 pb-1.5">
                          <span class="text-gray-400">Scheduled for:</span>
                          <span class="font-bold">May 25, 2026 @ 6:00 PM</span>
                        </div>
                        <div class="flex justify-between border-b border-zinc-200 dark:border-zinc-800 pb-1.5">
                          <span class="text-gray-400">Location:</span>
                          <span class="font-bold truncate max-w-[180px]">{selectedEvent.location}</span>
                        </div>
                        <div class="flex justify-between pb-1.5">
                          <span class="text-gray-400">Admission:</span>
                          <span class="font-bold text-green-600 dark:text-green-400">Vouched Alumni Only</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* INTERACTIVE COMPONENT 1: SPOTLIGHT DISCUSSION BULLETIN BOARD */}
                  <div class="border-t border-zinc-200 dark:border-zinc-800 pt-8 space-y-6">
                    <div>
                      <h4 class="font-serif text-lg font-bold text-zinc-900 dark:text-white">Spotlight Discussion Board</h4>
                      <p class="text-xs text-gray-500 dark:text-zinc-400">Suggest questions or topics for breakout tables. Upvote matching concerns to prioritize discussions.</p>
                    </div>

                    {/* New post-it input form */}
                    <form onSubmit={handleAddBulletin} class="grid grid-cols-1 sm:grid-cols-[1.5fr_1fr_1fr_auto] gap-3 items-end bg-[#fafaf9] dark:bg-zinc-950 p-4 rounded-[6px] border border-zinc-200 dark:border-zinc-800">
                      <div class="space-y-1.5">
                        <label class="font-mono text-[8px] font-bold text-gray-400 uppercase tracking-widest block">Discussion Question / Topic</label>
                        <input
                          type="text"
                          required
                          value={newBulletinText}
                          onChange={(e) => setNewBulletinText(e.target.value)}
                          placeholder="e.g. GPU deployment tips..."
                          class="w-full text-xs bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-800 rounded-[4px] px-2.5 py-1.5 focus:border-black dark:focus:border-white focus:outline-none text-zinc-900 dark:text-white"
                        />
                      </div>
                      <div class="space-y-1.5">
                        <label class="font-mono text-[8px] font-bold text-gray-400 uppercase tracking-widest block">Your Full Name</label>
                        <input
                          type="text"
                          required
                          value={newBulletinName}
                          onChange={(e) => setNewBulletinName(e.target.value)}
                          placeholder="Jane Doe"
                          class="w-full text-xs bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-800 rounded-[4px] px-2.5 py-1.5 focus:border-black dark:focus:border-white focus:outline-none text-zinc-900 dark:text-white"
                        />
                      </div>
                      <div class="space-y-1.5">
                        <label class="font-mono text-[8px] font-bold text-gray-400 uppercase tracking-widest block">Cohort Year</label>
                        <input
                          type="text"
                          required
                          value={newBulletinYear}
                          onChange={(e) => setNewBulletinYear(e.target.value)}
                          placeholder="e.g. 18"
                          class="w-full text-xs bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-800 rounded-[4px] px-2.5 py-1.5 focus:border-black dark:focus:border-white focus:outline-none text-zinc-900 dark:text-white"
                        />
                      </div>
                      <button
                        type="submit"
                        class="bg-black text-white dark:bg-white dark:text-black font-mono text-[10px] font-bold uppercase tracking-wider px-4 py-2.5 rounded-[4px] hover:opacity-85 cursor-pointer shadow-sm"
                      >
                        Pin Topic
                      </button>
                    </form>

                    {/* Bulletins grid list */}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {bulletins
                        .filter(b => b.eventId === selectedId)
                        .map(b => (
                          <div key={b.id} class="bg-[#f4f3ee]/50 dark:bg-zinc-900/40 border border-zinc-200 dark:border-zinc-850 p-4 rounded-[6px] flex flex-col justify-between space-y-4 hover:border-zinc-400 transition-colors">
                            <p class="text-xs text-zinc-700 dark:text-zinc-300 font-serif leading-relaxed">
                              "{b.text}"
                            </p>
                            
                            <div class="flex items-center justify-between border-t border-zinc-200/50 dark:border-zinc-800 pt-3 text-[10px]">
                              <span class="font-mono font-bold text-zinc-500">
                                {b.name} '{b.year.slice(-2)}
                              </span>
                              <button
                                onClick={() => handleVoteBulletin(b.id)}
                                class="flex items-center gap-1.5 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-850 hover:bg-zinc-100 dark:hover:bg-zinc-800 px-2 py-1 rounded-[4px] text-zinc-600 dark:text-zinc-400 cursor-pointer shadow-sm font-mono font-bold"
                              >
                                <span>▲ Upvote</span>
                                <span style={{ color: accent.hex }}>{b.votes}</span>
                              </button>
                            </div>
                          </div>
                        ))}
                    </div>

                  </div>

                </div>

                {/* Right Side: Interactive 1:1 Booking Slot Grid */}
                <div class="space-y-6">
                  
                  {/* Master schedule select */}
                  <div class="border border-zinc-200 dark:border-zinc-800 bg-[#f4f3ee]/40 dark:bg-zinc-950/20 p-4 rounded-[6px] flex items-center justify-between font-mono text-[11px]">
                    <span class="text-gray-400">Select Event:</span>
                    <select
                      value={selectedId}
                      onChange={(e) => setSelectedId(e.target.value)}
                      class="bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-800 rounded px-2 py-1 text-xs text-zinc-900 dark:text-white"
                    >
                      {events.map(ev => (
                        <option key={ev.id} value={ev.id}>{ev.title.slice(0, 25)}...</option>
                      ))}
                    </select>
                  </div>

                  {/* 1:1 Slot Booking Card */}
                  <div class="border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 rounded-[6px] p-6 space-y-6 shadow-sm">
                    <div>
                      <h4 class="font-serif text-lg font-bold text-zinc-900 dark:text-white">1:1 Mentorship Breakouts</h4>
                      <p class="text-xs text-gray-500 dark:text-zinc-400 mt-0.5">Select a 15-minute slot during networking to book direct 1:1 advisory time with the host.</p>
                    </div>

                    {/* Booking slot list */}
                    <div class="grid grid-cols-2 gap-2">
                      {[
                        { time: '6:45 PM – 7:00 PM', status: 'available' },
                        { time: '7:00 PM – 7:15 PM', status: 'available' },
                        { time: '7:15 PM – 7:30 PM', status: 'available' },
                        { time: '7:30 PM – 7:45 PM', status: 'booked' },
                        { time: '8:00 PM – 8:15 PM', status: 'available' },
                        { time: '8:15 PM – 8:30 PM', status: 'available' }
                      ].map((slot, sIdx) => {
                        const isSelected = bookedSlot === sIdx;
                        const isBookedByOther = slot.status === 'booked';
                        
                        return (
                          <button
                            key={sIdx}
                            disabled={isBookedByOther}
                            onClick={() => {
                              setBookedSlot(isSelected ? null : sIdx);
                              triggerToast(isSelected ? 'Slot booking cancelled' : 'You have booked a 1:1 mentoring breakout slot!');
                            }}
                            class={`p-3 border rounded-[6px] text-center transition-all flex flex-col items-center justify-center space-y-1 font-mono cursor-pointer ${
                              isBookedByOther ? 'bg-zinc-50 dark:bg-zinc-950 border-zinc-200 dark:border-zinc-850 opacity-40 cursor-not-allowed' :
                              isSelected ? 'bg-zinc-900 text-white border-zinc-950 dark:bg-white dark:text-black dark:border-white shadow-sm' :
                              'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-850 hover:bg-zinc-50 dark:hover:bg-zinc-850'
                            }`}
                          >
                            <span class="text-[10px] font-bold">{slot.time}</span>
                            <span class="text-[8px] uppercase tracking-wider font-semibold">
                              {isBookedByOther ? 'Unavailable' : isSelected ? '✓ Reserved' : 'Book Session'}
                            </span>
                          </button>
                        );
                      })}
                    </div>

                    {/* Confirmation state */}
                    {bookedSlot !== null && (
                      <div class="bg-green-50 dark:bg-green-950/20 border border-green-200 dark:border-green-800 p-3.5 rounded-[6px] flex items-start gap-3">
                        <Icon name="check-circle" className="size-5 text-green-600 shrink-0 mt-0.5" />
                        <div class="text-xs">
                          <p class="font-bold text-green-800 dark:text-green-400">1:1 Session Confirmed</p>
                          <p class="text-green-700 dark:text-green-500 mt-0.5">You have booked a session with <strong>{selectedEvent.host.split(' (')[0]}</strong>. Bring your questions to the roundtable room.</p>
                        </div>
                      </div>
                    )}

                  </div>

                </div>

              </div>
            )}

          </main>

          {/* FLOATING NAVIGATION PILL DOCK (Option B: Minimalist Dock Layout) */}
          <div class="fixed bottom-6 inset-x-0 z-40 flex justify-center pointer-events-none">
            <nav class="bg-[#ffffff]/80 dark:bg-[#121211]/80 backdrop-blur-md border border-zinc-300 dark:border-zinc-800 px-4 py-2 rounded-full shadow-lg flex items-center gap-1.5 pointer-events-auto transition-all">
              
              <div class="flex items-center gap-1">
                {[
                  { id: 'broadside', name: 'Newspaper', icon: 'file-text' },
                  { id: 'journal', name: 'Journal', icon: 'book-open' },
                  { id: 'index', name: 'Catalog', icon: 'list' },
                  { id: 'poster', name: 'Poster & Board', icon: 'layout' }
                ].map((item) => {
                  const isActive = concept === item.id;
                  return (
                    <button
                      key={item.id}
                      onClick={() => {
                        setConcept(item.id);
                        setReferrer(null);
                      }}
                      class={`px-3 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1.5 cursor-pointer transition-all ${
                        isActive ? 'bg-[#0c0c0b] text-white dark:bg-[#fafaf9] dark:text-[#0c0c0b] font-bold shadow-sm' : 'text-gray-500 hover:text-black dark:hover:text-white'
                      }`}
                    >
                      <Icon name={item.icon} className="size-3.5" />
                      <span class="hidden sm:inline">{item.name}</span>
                    </button>
                  );
                })}
              </div>

              <div class="h-4 w-px bg-zinc-300 dark:bg-zinc-700 mx-1.5" />

              {/* Quick theme toggler in dock */}
              <button
                onClick={() => setTheme(theme === 'day' ? 'night' : 'day')}
                class="size-7 rounded-full flex items-center justify-center text-zinc-500 hover:text-zinc-950 dark:hover:text-zinc-50 cursor-pointer"
                title="Toggle daylight/night"
              >
                {theme === 'day' ? <Icon name="sun" className="size-4" /> : <Icon name="moon" className="size-4" />}
              </button>

            </nav>
          </div>

          {/* TOAST SUCCESS FEEDBACK BUBBLE */}
          {toast && (
            <div class="fixed bottom-20 right-6 z-50 bg-zinc-950 dark:bg-white text-white dark:text-black text-xs font-semibold px-4 py-3 rounded-[6px] shadow-lg flex items-center gap-2 border border-zinc-800 dark:border-zinc-200 animate-slideup">
              <Icon name="check-circle" className="size-4 text-green-500" strokeWidth={2.5} />
              <span>{toast}</span>
            </div>
          )}

          {/* FOOTER */}
          <footer class="mt-20 border-t border-zinc-200 dark:border-zinc-850 py-8 bg-[#f4f3ee]/30 dark:bg-zinc-950/40">
            <div class="max-w-7xl mx-auto px-4 text-center space-y-2">
              <p class="text-[10px] text-gray-400 dark:text-zinc-500 font-mono tracking-wider uppercase">
                BridgeCircle Community Platform · Civic Editorial Standard 2.0
              </p>
              <p class="text-xs text-gray-500 dark:text-zinc-400">
                Created as a visual prototype workbook to explore card typography, layout grids, and interactive scheduling widgets.
              </p>
            </div>
          </footer>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
