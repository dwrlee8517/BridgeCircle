<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BridgeCircle — Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f6f4ee; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  *::selection { background: rgba(184,78,44,0.92); color: #fff; }
  ::placeholder { color: rgba(122,110,94,0.55) !important; opacity: 1; }
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
    outline: 2px solid rgba(184,78,44,0.5); outline-offset: 2px;
  }
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel">
  window.ThemeCtx = React.createContext(null);
</script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="civic-data.jsx"></script>
<script type="text/babel" src="admin-data.jsx"></script>
<script type="text/babel" src="atrium-theme.jsx"></script>
<script type="text/babel" src="admin-shell.jsx"></script>
<script type="text/babel" src="admin-screens-core.jsx"></script>
<script type="text/babel" src="admin-screens-rest.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "terracotta",
  "density": "compact",
  "shape": "sharper",
  "tone": "bone"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = useAtriumTheme(tweaks);

  return (
    <ThemeCtx.Provider value={theme}>
      <AdminApp />

      <TweaksPanel title="Tweaks">
        <TweakSection label="System" />
        <AccentSwatchRow tweaks={tweaks} setTweak={setTweak} />
        <ToneSwatchRow tweaks={tweaks} setTweak={setTweak} />
        <TweakRadio
          label="Density"
          value={tweaks.density}
          options={['compact', 'comfortable', 'roomy']}
          onChange={(v) => setTweak('density', v)}
        />
        <TweakRadio
          label="Corner shape"
          value={tweaks.shape}
          options={['sharper', 'soft', 'softest']}
          onChange={(v) => setTweak('shape', v)}
        />
      </TweaksPanel>
    </ThemeCtx.Provider>
  );
}

function AccentSwatchRow({ tweaks, setTweak }) {
  const opts = [
    { key: 'terracotta', hex: '#c75a3a', name: 'Terracotta' },
    { key: 'olive',      hex: '#5f7038', name: 'Olive' },
    { key: 'plum',       hex: '#7a3a5e', name: 'Plum' },
  ];
  return (
    <div style={{ display: 'flex', gap: 6, marginTop: -4 }}>
      {opts.map(o => {
        const active = tweaks.accent === o.key;
        return (
          <button key={o.key} onClick={() => setTweak('accent', o.key)} title={o.name}
            style={{
              flex: 1, padding: '8px 6px',
              border: active ? '1px solid rgba(0,0,0,.5)' : '1px solid rgba(0,0,0,.12)',
              borderRadius: 10, background: 'rgba(255,255,255,.5)', cursor: 'pointer',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5,
            }}>
            <span style={{ width: '100%', height: 14, background: o.hex, borderRadius: 4 }} />
            <span style={{ fontSize: 10, color: 'rgba(41,38,27,.7)', fontWeight: 500 }}>{o.name}</span>
          </button>
        );
      })}
    </div>
  );
}

function ToneSwatchRow({ tweaks, setTweak }) {
  const opts = [
    { key: 'warm',    paper: '#efe7d8', card: '#f8f1e2', rule: '#d8ccb6', name: 'Warm' },
    { key: 'soft',    paper: '#f2ede2', card: '#faf5ea', rule: '#dcd3c1', name: 'Soft' },
    { key: 'neutral', paper: '#f4f1e9', card: '#fcf9f1', rule: '#ddd8cb', name: 'Neutral' },
    { key: 'bone',    paper: '#f6f4ee', card: '#fdfcf8', rule: '#dedbd1', name: 'Bone' },
  ];
  return (
    <div className="twk-row" style={{ marginTop: 4 }}>
      <div className="twk-lbl"><span>Surface tone</span></div>
      <div style={{ display: 'flex', gap: 6 }}>
        {opts.map(o => {
          const active = (tweaks.tone || 'warm') === o.key;
          return (
            <button key={o.key} onClick={() => setTweak('tone', o.key)} title={o.name}
              style={{
                flex: 1, padding: 4,
                border: active ? '1px solid rgba(0,0,0,.5)' : '1px solid rgba(0,0,0,.12)',
                borderRadius: 8, background: 'rgba(255,255,255,.5)', cursor: 'pointer',
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              }}>
              <span style={{ position: 'relative', width: '100%', height: 22, background: o.paper, borderRadius: 4, overflow: 'hidden', border: `1px solid ${o.rule}` }}>
                <span style={{ position: 'absolute', right: 3, bottom: 3, width: '55%', height: 11, background: o.card, borderRadius: 2, border: `1px solid ${o.rule}` }} />
              </span>
              <span style={{ fontSize: 9.5, color: 'rgba(41,38,27,.7)', fontWeight: 500 }}>{o.name}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
