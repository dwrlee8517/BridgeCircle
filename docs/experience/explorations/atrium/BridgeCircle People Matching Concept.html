<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>BridgeCircle - People Matching Concept</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent-color: #2563eb;
      --color-accent: #2563eb;
      --page-background: #fafaf9;
      --bg-bone: #fafaf9;
      --card-background: #ffffff;
      --card-bg: #ffffff;
      --text-color: #0c0c0b;
      --text-ink: #0c0c0b;
      --rule-color: #dcdcd6;
      --border-color: #dcdcd6;
      --text-muted: #4d4d4a;
      --surface-secondary: #f4f3ee;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;
      --space-7: 48px;
      --space-8: 64px;
      --radius-none: 0px;
      --radius-xs: 2px;
      --radius-sm: 4px;
      --radius-default: 6px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --shadow-sm: 0 1px 2px rgba(12,12,11,0.05);
      --shadow-md: 0 4px 12px rgba(12,12,11,0.08);
      --shadow-lg: 0 12px 28px rgba(12,12,11,0.15);
      --focus-ring: 2px solid rgba(37, 99, 235, 0.25);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg-bone);
      color: var(--text-ink);
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }
    button, input, textarea, select { font: inherit; }
    button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 2px solid rgba(37, 99, 235, 0.45);
      outline-offset: 2px;
    }
    ::selection { background: rgba(37, 99, 235, 0.15); color: var(--accent-color); }
    @media (max-width: 720px) {
      input, textarea, select { font-size: 16px !important; }
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <div id="root"></div>

  <script type="text/babel" src="matching-data.jsx"></script>
  <script type="text/babel" src="matching-concept.jsx"></script>
</body>
</html>
