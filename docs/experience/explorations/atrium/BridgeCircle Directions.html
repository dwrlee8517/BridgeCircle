<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BridgeCircle v2 — Design Directions</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght,ital@8..60,300..700,0;8..60,300..700,1&family=Fraunces:opsz,wght,ital@9..144,300..800,0;9..144,300..800,1&family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=Mona+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #1f1f1f; font-family: 'Inter', system-ui, sans-serif; }
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="directions.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

function App() {
  const dirs = ['threadlight', 'civic', 'atrium'].map(k => window.DIRECTIONS[k]);
  return (
    <DesignCanvas title="BridgeCircle v2 — Design Directions" subtitle="Three opinionated systems for the same product. Pick one and I’ll build it out.">
      <DCSection id="systems" title="01 · Direction overview">
        {dirs.map(d => (
          <DCArtboard key={d.name} id={`sys-${d.name}`} label={`${d.name} — system`} width={760} height={620}>
            <SystemCard d={d} />
          </DCArtboard>
        ))}
      </DCSection>

      <DCSection id="hero" title="02 · Home hero — same content, three voices">
        {dirs.map(d => (
          <DCArtboard key={d.name} id={`hero-${d.name}`} label={`${d.name} — home hero`} width={1040} height={640}>
            <HeroCard d={d} />
          </DCArtboard>
        ))}
      </DCSection>

      <DCSection id="member" title="03 · Member tile — same person, three voices">
        {dirs.map(d => (
          <DCArtboard key={d.name} id={`member-${d.name}`} label={`${d.name} — member tile`} width={360} height={360}>
            <MemberCard d={d} />
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
