<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BridgeCircle — Atrium</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #ebe1cb; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body { overflow-x: hidden; }
  *::selection { background: rgba(184,78,44,0.92); color: #fff; }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid rgba(199,90,58,0.5); outline-offset: 2px;
  }
  /* Prevent iOS zoom on input focus; mobile typography baselines */
  @media (max-width: 720px) {
    input, textarea, select { font-size: 16px !important; }
  }
  /* Hide horizontal scrollbars on horizontally-scrollable rails */
  .atrium-hscroll { scrollbar-width: thin; }
  .atrium-hscroll::-webkit-scrollbar { height: 6px; }
  .atrium-hscroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 999px; }
  @keyframes atrium-ai-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }
</style>
</head>
<body style="background-color: rgb(249, 247, 243)">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel">
  // ThemeCtx is shared across every Atrium component.
  window.ThemeCtx = React.createContext(null);
</script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="civic-data.jsx"></script>
<script type="text/babel" src="atrium-theme.jsx"></script>
<script type="text/babel" src="ai-search.jsx"></script>
<script type="text/babel" src="directory-filters.jsx"></script>
<script type="text/babel" src="atrium-shell.jsx"></script>
<script type="text/babel" src="atrium-screens-home.jsx"></script>
<script type="text/babel" src="atrium-screens-people.jsx"></script>
<script type="text/babel" src="atrium-screens-rest.jsx"></script>
<script type="text/babel" src="atrium-screens-inbox.jsx"></script>
<!-- Profile loads AFTER rest so window.AtriumProfile takes the rich version. -->
<script type="text/babel" src="atrium-screens-profile.jsx"></script>
<script type="text/babel" src="atrium-screens-thread.jsx"></script>
<script type="text/babel" src="atrium-screens-event-detail.jsx"></script>

<script type="text/babel">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "terracotta",
  "cardTone": "white",
  "density": "compact",
  "shape": "sharper",
  "tone": "neutral",
  "headline": "Lead the way",
  "timelineOrientation": "vertical",
  "heroBg": "#2a241c"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = useAtriumTheme(tweaks);
  const [route, setRoute] = useState('home');
  const [activeProfile, setActiveProfile] = useState('iris-okonkwo');
  const [activeThread, setActiveThread]   = useState('thr-iris-maren');
  const [activeEvent, setActiveEvent]     = useState('evt-01');

  // Sync the body background to the current tone preset so the page
  // outside the shell (visible briefly at the very top before the sticky
  // header lands, and underneath any overscroll) matches the tone.
  React.useEffect(() => {
    document.body.style.background = theme.palette.paper;
  }, [theme.palette.paper]);

  const goto = (r) => { setRoute(r); window.scrollTo({ top: 0, behavior: 'instant' }); };

  return (
    <ThemeCtx.Provider value={theme}>
      <AtriumRouteCtx.Provider value={{ route, goto, activeProfile, setActiveProfile, activeThread, setActiveThread, activeEvent, setActiveEvent }}>
        <AtriumShell>
          {route === 'home'    ? <AtriumHome />    : null}
          {route === 'people'  ? <AtriumPeople />  : null}
          {route === 'inbox'   ? <AtriumInbox />   : null}
          {route === 'events'  ? <AtriumEvents />  : null}
          {route === 'profile' ? <AtriumProfile /> : null}
          {route === 'thread'  ? <AtriumAskThread /> : null}
          {route === 'event-detail' ? <AtriumEventDetail /> : null}
        </AtriumShell>

        <TweaksPanel title="Tweaks">
          <TweakSection label="System" />
          <AccentSwatchRow tweaks={tweaks} setTweak={setTweak} />

          <CardToneRow tweaks={tweaks} setTweak={setTweak} />

          <ToneSwatchRow tweaks={tweaks} setTweak={setTweak} />

          <TweakRadio
            label="Density"
            value={tweaks.density}
            options={['compact', 'comfortable', 'roomy']}
            onChange={(v) => setTweak('density', v)}
          />

          <TweakRadio
            label="Corner shape"
            value={tweaks.shape}
            options={['sharper', 'soft', 'softest']}
            onChange={(v) => setTweak('shape', v)}
          />

          <TweakColor
            label="Hero banner"
            value={tweaks.heroBg}
            options={theme.heroBgOptions}
            onChange={(v) => setTweak('heroBg', v)}
          />

          <TweakRadio
            label="Timeline orientation"
            value={tweaks.timelineOrientation}
            options={['vertical', 'horizontal']}
            onChange={(v) => setTweak('timelineOrientation', v)}
          />

          <TweakSection label="Voice" />
          <TweakText
            label="Home headline"
            value={tweaks.headline}
            placeholder="Use an em-dash or comma to split the warm coda."
            onChange={(v) => setTweak('headline', v)}
          />
        </TweaksPanel>
      </AtriumRouteCtx.Provider>
    </ThemeCtx.Provider>
  );
}

function AccentSwatchRow({ tweaks, setTweak }) {
  const opts = [
    { key: 'terracotta', hex: '#b84e2c', name: 'Terracotta' },
    { key: 'saffron',    hex: '#b88033', name: 'Saffron' },
    { key: 'olive',      hex: '#5f7038', name: 'Olive' },
    { key: 'lake',       hex: '#2f6e6c', name: 'Lake' },
    { key: 'indigo',     hex: '#3f5680', name: 'Indigo' },
    { key: 'plum',       hex: '#7a3a5e', name: 'Plum' },
    { key: 'heather',    hex: '#8a5e7a', name: 'Heather' },
  ];
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, minmax(0, 1fr))', gap: 4, marginTop: -4 }}>
      {opts.map(o => {
        const active = tweaks.accent === o.key;
        return (
          <button key={o.key} onClick={() => setTweak('accent', o.key)} title={o.name}
            style={{
              padding: '6px 3px',
              border: active ? '1px solid rgba(0,0,0,.5)' : '1px solid rgba(0,0,0,.12)',
              borderRadius: 8,
              background: 'rgba(255,255,255,.5)',
              cursor: 'pointer',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              minWidth: 0,
            }}>
            <span style={{ width: '100%', height: 14, background: o.hex, borderRadius: 4 }} />
            <span style={{ fontSize: 8.5, color: 'rgba(41,38,27,.7)', fontWeight: 500, letterSpacing: '0.02em', maxWidth: '100%', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{o.name}</span>
          </button>
        );
      })}
    </div>
  );
}

// ToneSwatchRow — swatches showing actual paper/card/rule samples per tone
// preset, so the user can SEE how warm or neutral the surface gets before
// committing. Tones step down from full oat warmth to a true bone white.
function ToneSwatchRow({ tweaks, setTweak }) {
  const opts = [
    { key: 'warm',      paper: '#efe7d8', card: '#f8f1e2', rule: '#d8ccb6', name: 'Warm' },
    { key: 'lifted',    paper: '#ebe1cb', card: '#fdf8eb', rule: '#cdbe9c', name: 'Lifted' },
    { key: 'soft',      paper: '#f2ede2', card: '#faf5ea', rule: '#dcd3c1', name: 'Soft' },
    { key: 'neutral',   paper: '#f4f1e9', card: '#fcf9f1', rule: '#ddd8cb', name: 'Neutral' },
    { key: 'bone',      paper: '#f6f4ee', card: '#fdfcf8', rule: '#dedbd1', name: 'Bone' },
    { key: 'lamplight', paper: '#1a1612', card: '#2a221a', rule: '#3d3328', name: 'Lamp' },
  ];
  return (
    <div className="twk-row" style={{ marginTop: 4 }}>
      <div className="twk-lbl"><span>Surface tone</span></div>
      <div style={{ display: 'flex', gap: 6 }}>
        {opts.map(o => {
          const active = (tweaks.tone || 'warm') === o.key;
          return (
            <button key={o.key} onClick={() => setTweak('tone', o.key)} title={o.name}
              style={{
                flex: 1,
                padding: 4,
                border: active ? '1px solid rgba(0,0,0,.5)' : '1px solid rgba(0,0,0,.12)',
                borderRadius: 8,
                background: 'rgba(255,255,255,.5)',
                cursor: 'pointer',
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              }}>
              {/* Composite swatch — paper underlay + card chip + rule strip */}
              <span style={{
                position: 'relative', width: '100%', height: 22,
                background: o.paper, borderRadius: 4, overflow: 'hidden',
                border: `1px solid ${o.rule}`,
              }}>
                <span style={{
                  position: 'absolute', right: 3, bottom: 3, width: '55%', height: 11,
                  background: o.card, borderRadius: 2, border: `1px solid ${o.rule}`,
                }} />
              </span>
              <span style={{ fontSize: 9.5, color: 'rgba(41,38,27,.7)', fontWeight: 500 }}>{o.name}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function CardToneRow({ tweaks, setTweak }) {
  const opts = [
    { key: 'oat',       card: '#f8f1e2', cardAlt: '#fbf6ea', name: 'Oat' },
    { key: 'parchment', card: '#f5edd8', cardAlt: '#f8f2e0', name: 'Parchment' },
    { key: 'chalk',     card: '#f2f1eb', cardAlt: '#f6f5f0', name: 'Chalk' },
    { key: 'white',     card: '#fefefe', cardAlt: '#ffffff',  name: 'White' },
  ];
  return (
    <div className="twk-row" style={{ marginTop: 4 }}>
      <div className="twk-lbl"><span>Card tone</span></div>
      <div style={{ display: 'flex', gap: 6 }}>
        {opts.map(o => {
          const active = (tweaks.cardTone || 'oat') === o.key;
          return (
            <button key={o.key} onClick={() => setTweak('cardTone', o.key)} title={o.name}
              style={{
                flex: 1, padding: 4,
                border: active ? '1px solid rgba(0,0,0,.5)' : '1px solid rgba(0,0,0,.12)',
                borderRadius: 8, background: 'rgba(255,255,255,.5)',
                cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              }}>
              <span style={{
                position: 'relative', width: '100%', height: 22,
                background: o.card, borderRadius: 4, overflow: 'hidden',
                border: '1px solid rgba(0,0,0,.08)',
              }}>
                <span style={{
                  position: 'absolute', right: 3, bottom: 3, width: '55%', height: 11,
                  background: o.cardAlt, borderRadius: 2, border: '1px solid rgba(0,0,0,.06)',
                }} />
              </span>
              <span style={{ fontSize: 9.5, color: 'rgba(41,38,27,.7)', fontWeight: 500 }}>{o.name}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
