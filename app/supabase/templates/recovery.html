<!doctype html>
<html lang="en">
  <body style="margin:0;background:#f6f8fa;font-family:Arial,sans-serif;color:#191f28">
    <div style="max-width:520px;margin:0 auto;padding:40px 20px">
      <div style="background:#fff;border:1px solid #e5e8eb;border-radius:16px;padding:32px">
        <p style="margin:0 0 8px;font-size:13px;font-weight:700;color:#1957c2">
          BridgeCircle
        </p>
        <h1 style="margin:0 0 12px;font-size:24px;line-height:1.25">Reset your password</h1>
        <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#4e5968">
          Use this one-time link to choose a new password. If you did not request this,
          you can ignore this email.
        </p>
        <a
          href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&amp;type=recovery&amp;next=%2Freset-password%2Fupdate"
          style="display:inline-block;border-radius:12px;background:#1957c2;color:#fff;padding:13px 18px;font-size:14px;font-weight:700;text-decoration:none"
        >
          Choose a new password
        </a>
      </div>
    </div>
  </body>
</html>
