# feature:auth.sign-in
# Signs in with a seeded persona (app/supabase/seeds/seed.sql) and lands on
# Home. Mirrors app/tests/e2e/invites-sign-in/sign-in.spec.ts on the web.
# Requires MAESTRO_EMAIL / MAESTRO_PASSWORD (see mobile/e2e/README.md).
appId: com.bridgecircle.app
tags:
  - parity
---
- launchApp:
    clearState: true
- assertVisible: 'Welcome back'
- assertVisible: 'Sign in to your verified school circle.'
- tapOn:
    id: 'sign-in-email'
- inputText: ${MAESTRO_EMAIL}
- tapOn:
    id: 'sign-in-password'
- inputText: ${MAESTRO_PASSWORD}
- hideKeyboard
- tapOn: 'Sign in'
- extendedWaitUntil:
    visible:
      id: 'home-screen'
    timeout: 15000
