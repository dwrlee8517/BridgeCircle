# feature:auth.sign-in
# Signs in with the seeded dev account (see docs/runbooks/seed-dev.md) and
# lands on the Help hub. Mirrors app/tests/e2e/sign-in.spec.ts on the web.
# Requires MAESTRO_EMAIL / MAESTRO_PASSWORD (see mobile/e2e/README.md).
appId: com.bridgecircle.app
tags:
  - parity
---
- launchApp:
    clearState: true
- assertVisible: 'Welcome back'
- assertVisible: 'Sign in to your verified alumni network.'
- tapOn:
    id: 'sign-in-email'
- inputText: ${MAESTRO_EMAIL}
- tapOn:
    id: 'sign-in-password'
- inputText: ${MAESTRO_PASSWORD}
- hideKeyboard
- tapOn: 'Sign in'
- extendedWaitUntil:
    visible:
      id: 'help-screen'
    timeout: 15000
