name: Mobile E2E

# Maestro flows (mobile/e2e/flows) on an Android emulator — the mobile
# mirror of e2e.yml. Like the web suite it runs against the shared
# bridgecircle-dev Supabase (via Doppler) and the seeded dev accounts.
#
# Opt-in for now: apply the `run-mobile-e2e` label on a PR, or dispatch
# manually. Building the native app in CI takes ~15–25 min; once the
# pipeline has proven itself, flip this to run on every PR (drop the label
# condition) so it matches e2e.yml exactly.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch: {}

concurrency:
  group: mobile-e2e-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: mobile

jobs:
  maestro:
    name: Maestro (android emulator)
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-mobile-e2e') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mobile/pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: dopplerhq/cli-action@v3

      - run: pnpm install --frozen-lockfile

      # Generate the android project and build a release APK (release so the
      # JS bundle is baked in — no Metro server on the emulator; Expo's
      # default release config signs with the debug keystore, which is fine
      # for CI). Doppler supplies the Supabase URL/key that app.config.ts
      # inlines into the bundle.
      - name: Prebuild android project
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- pnpm expo prebuild --platform android --no-install

      - name: Build release APK
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        working-directory: mobile/android
        run: doppler run -- ./gradlew assembleRelease

      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          working-directory: mobile
          script: |
            adb install android/app/build/outputs/apk/release/app-release.apk
            MAESTRO_EMAIL=mentor-mark@example.com MAESTRO_PASSWORD=devseed-password-2 maestro test e2e/flows

      - name: Upload Maestro artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts
          path: ~/.maestro/tests
          retention-days: 14
