name: E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:
  playwright:
    name: Playwright (chromium)
    # Apply the `skip-e2e` label on the PR to bypass — useful for hotfixes
    # or doc-only changes where the suite is not relevant.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-e2e') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - uses: dopplerhq/cli-action@v3

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # The Playwright runner itself needs Doppler secrets: the core-loop
      # spec's beforeAll builds a Supabase admin client. The nested
      # webServer (`doppler run -- pnpm dev`) re-resolves the same secrets
      # for the Next.js server. DOPPLER_TOKEN authenticates both.
      - name: Run Playwright suite
        env:
          CI: 'true'
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: app/test-results
          retention-days: 14
