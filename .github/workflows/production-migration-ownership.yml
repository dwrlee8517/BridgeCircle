name: Production migration ownership

# Temporary, manual-only bridge used to prove that GitHub Actions can own one
# production migration before the database-v2 reset. This workflow never
# deploys application code and is removed when the final CD pipeline lands.
on:
  workflow_dispatch:
    inputs:
      expected_pending_migration:
        description: "Use 'none' for the connectivity proof or one approved 14-digit migration version"
        required: true
        default: none
        type: string
      confirmation:
        description: 'Type RUN_PRODUCTION_MIGRATION_OWNERSHIP'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-migration-ownership
  cancel-in-progress: false

jobs:
  migrate:
    name: Validate and apply the approved production migration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    defaults:
      run:
        working-directory: app
    env:
      EXPECTED_SHA: ${{ github.sha }}
      EXPECTED_PENDING_MIGRATION: ${{ inputs.expected_pending_migration }}
      PRODUCTION_PROJECT_REF: edumxwzilfgvamzarwvo
      CONFIRMATION: ${{ inputs.confirmation }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - uses: dopplerhq/cli-action@v3

      - run: pnpm install --frozen-lockfile

      - name: Verify migration-only workflow boundaries
        run: pnpm check:production-migration-ownership

      - name: Verify typed operator confirmation
        run: |
          if [ "$CONFIRMATION" != "RUN_PRODUCTION_MIGRATION_OWNERSHIP" ]; then
            echo "::error::Typed production migration confirmation did not match"
            exit 1
          fi

      - name: Verify pinned Supabase and Postgres clients
        run: |
          pnpm exec supabase --version
          psql --version

      - name: Validate target, SHA, database identity, and migration history
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: doppler run --preserve-env -- node --import tsx scripts/production-migration-ownership-preflight.ts

      - name: Dry-run the approved migration set
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: >-
          doppler run --preserve-env -- bash -euo pipefail -c
          'pnpm exec supabase db push --db-url "$SUPABASE_DB_URL" --dry-run'

      - name: Apply the approved migration set
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: >-
          doppler run --preserve-env -- bash -euo pipefail -c
          'pnpm exec supabase db push --db-url "$SUPABASE_DB_URL" --yes'

      - name: Verify production has no pending migration
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          EXPECTED_PENDING_MIGRATION: none
        run: doppler run --preserve-env -- node --import tsx scripts/production-migration-ownership-preflight.ts
