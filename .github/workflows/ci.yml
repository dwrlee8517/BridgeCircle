name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:
  quality:
    name: Lint & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm biome check .

      - name: ESLint
        run: pnpm lint

      - name: Design-token ratchet
        run: pnpm check:tokens

      - name: TypeScript
        run: pnpm tsc --noEmit

      - name: Vitest
        run: pnpm vitest run --passWithNoTests

  build:
    name: Build (validates types vs. migrations)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - uses: dopplerhq/cli-action@v3

      - run: pnpm install --frozen-lockfile

      # `next build` type-checks the whole codebase against
      # src/db/database.types.ts. If a migration in this PR removed or
      # renamed a column that app code still references, this fails here
      # — before the migration ever lands on prod.
      - name: Next build
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          NODE_ENV: production
        run: doppler run --preserve-env=NODE_ENV -- pnpm build
