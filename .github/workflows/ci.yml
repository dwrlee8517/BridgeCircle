name: CI

# Docs-only changes don't affect lint/test/build outcomes, so skip the
# pipeline when a push or PR touches nothing but docs. `paths-ignore` skips
# the run only when EVERY changed file matches — any code change still runs
# the full suite. These checks are not required for merge, so a skipped run
# leaves no PR stuck "pending"; if they're ever made required, this needs the
# always-report gate-job pattern instead.
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'product-spec-obsidian-vault/**'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'product-spec-obsidian-vault/**'
      - '.gitignore'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:
  quality:
    name: Lint & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm biome check .

      - name: ESLint
        run: pnpm lint

      - name: Design-token ratchet
        run: pnpm check:tokens

      - name: Production migration ownership ratchet
        run: pnpm check:production-migration-ownership

      - name: TypeScript
        run: pnpm tsc --noEmit

      - name: Vitest
        run: pnpm vitest run --passWithNoTests

  build:
    name: Build (validates types vs. migrations)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - uses: dopplerhq/cli-action@v3

      - run: pnpm install --frozen-lockfile

      # `next build` type-checks the whole codebase against
      # src/db/database.types.ts. If a migration in this PR removed or
      # renamed a column that app code still references, this fails here
      # — before the migration ever lands on prod.
      - name: Next build
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          NODE_ENV: production
        run: doppler run --preserve-env=NODE_ENV -- pnpm build
