name: CI

# `CI gate` is the required branch-protection check. It always reports for PRs:
# green after lint/test/build pass, or green when a PR is legitimately
# docs-only and those expensive jobs are skipped. Pushes that touch only docs
# still skip this workflow because required checks apply at PR merge time.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'product-spec-obsidian-vault/**'
      - '.gitignore'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:
  changes:
    name: Detect docs-only PRs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)
          echo "Changed files:"; echo "$files"
          non_docs=$(echo "$files" | grep -vE '(^docs/|^product-spec-obsidian-vault/|\.md$|^\.gitignore$)' || true)
          if [ -n "$non_docs" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: Lint & test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm biome check .

      - name: ESLint
        run: pnpm lint

      - name: Design-token ratchet
        run: pnpm check:tokens

      - name: Production migration ownership ratchet
        run: pnpm check:production-migration-ownership

      - name: TypeScript
        run: pnpm tsc --noEmit

      - name: Vitest
        run: pnpm vitest run --passWithNoTests

  build:
    name: Build (validates types vs. migrations)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - uses: dopplerhq/cli-action@v3

      - run: pnpm install --frozen-lockfile

      # `next build` type-checks the whole codebase against
      # src/db/database.types.ts. If a migration in this PR removed or
      # renamed a column that app code still references, this fails here
      # — before the migration ever lands on prod.
      - name: Next build
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          NODE_ENV: production
        run: doppler run --preserve-env=NODE_ENV -- pnpm build

  ci-gate:
    name: CI gate
    needs: [changes, quality, build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: .
    steps:
      - name: Report
        run: |
          code="${{ needs.changes.outputs.code }}"
          quality="${{ needs.quality.result }}"
          build="${{ needs.build.result }}"
          echo "code=$code quality=$quality build=$build"
          if [ "$quality" = "success" ] && [ "$build" = "success" ]; then
            echo "CI quality and build jobs passed."
          elif [ "$code" != "true" ] && [ "$quality" = "skipped" ] && [ "$build" = "skipped" ]; then
            echo "Docs-only PR — CI jobs legitimately skipped."
          else
            echo "::error::CI did not pass (quality: $quality, build: $build)."
            exit 1
          fi
